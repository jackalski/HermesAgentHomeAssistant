configuration:
  timezone:
    name: Zona horaria
    description: Zona horaria para el complemento (ej. Europe/Sofia, America/New_York)

  addon_log_level:
    name: Nivel de log del complemento
    description: Verbosidad de los logs de inicio del contenedor del complemento (colores y emojis cuando el terminal de logs es interactivo).
    options:
      error: "Solo errores"
      warn: "Advertencias y errores"
      info: "Info (predeterminado)"
      debug: "Debug (detallado)"

  setup_profile:
    name: Perfil de configuración
    description: "Preset de primer arranque. home_assistant habilita LAN HTTPS, MCP automático con token y bootstrap de model/browser/timezone. general usa solo acceso local. advanced usa solo opciones individuales."
    options:
      home_assistant: "Home Assistant (recomendado)"
      general: "Asistente general"
      advanced: "Avanzado (opciones manuales)"

  default_provider:
    name: Proveedor predeterminado
    description: "Proveedor LLM principal para el primer arranque. Nous Portal usa OAuth (`hermes setup --portal` o `hermes auth add nous` en terminal). Ollama corresponde a Ollama Cloud (`ollama-cloud`)."
    options:
      nous: "Nous Portal"
      openrouter: "OpenRouter"
      google: "Google (clave API Gemini)"
      anthropic: "Anthropic"
      ollama: "Ollama Cloud"
      minimax: "MiniMax"
      xai: "xAI (Grok)"
      openai: "OpenAI"

  default_model_preset:
    name: Preajuste de modelo
    description: "Usa Custom y define el ID del modelo en Modelo predeterminado."
    options:
      custom: "ID de modelo personalizado"

  default_model:
    name: Modelo predeterminado
    description: "ID del modelo para el proveedor seleccionado (p. ej. google/gemini-2.5-flash para OpenRouter, claude-sonnet-4-6 para Anthropic, gpt-oss:120b para Ollama Cloud). Bootstrap solo en el primer arranque si no hay modelo configurado."

  provider_api_keys:
    name: Claves API de proveedores
    description: Tokens opcionales de proveedores y herramientas sincronizados en /config/.hermes/.env al reiniciar. Los proveedores OAuth/device-code aún requieren `hermes auth` en el terminal.
    fields:
      openai_api_key:
        name: Clave API de OpenAI
        description: Sincronizada como OPENAI_API_KEY.
      openrouter_api_key:
        name: Clave API de OpenRouter
        description: Sincronizada como OPENROUTER_API_KEY.
      anthropic_api_key:
        name: Clave API de Anthropic
        description: Sincronizada como ANTHROPIC_API_KEY.
      google_api_key:
        name: Clave API de Google
        description: Sincronizada como GOOGLE_API_KEY.
      ollama_api_key:
        name: Clave API de Ollama Cloud
        description: Sincronizada como OLLAMA_API_KEY (desde ollama.com/settings/keys).
      minimax_api_key:
        name: Clave API de MiniMax
        description: Sincronizada como MINIMAX_API_KEY.
      discord_bot_token:
        name: Token de bot de Discord
        description: Sincronizado como DISCORD_BOT_TOKEN.
      github_token:
        name: Token de GitHub
        description: Sincronizado como GITHUB_TOKEN.
      xai_api_key:
        name: Clave API de xAI
        description: Sincronizada como XAI_API_KEY.
      firecrawl_api_key:
        name: Clave API de Firecrawl
        description: Sincronizada como FIRECRAWL_API_KEY.
      searxng_url:
        name: URL de SearXNG
        description: Sincronizada como SEARXNG_URL.

  home_assistant:
    name: Integración con Home Assistant
    description: Conecta Hermes a su instancia de Home Assistant para MCP, scripts y autodetección.
    fields:
      hass_url:
        name: URL de Home Assistant
        description: "Déjela vacía para autodetección en HAOS (recomendado). Se sincroniza como HOMEASSISTANT_URL en /config/.hermes/.env cuando hay token."
      homeassistant_token:
        name: Token de Home Assistant
        description: Token de larga duración para MCP y scripts de HA. Enmascarado tras guardar. Persistido en /config/secrets/homeassistant.token.
      auto_configure_mcp:
        name: Configurar MCP automáticamente para Home Assistant
        description: "Cuando está ACTIVADO y el token está configurado, registra Home Assistant en Hermes MCP (mcp_servers) en cada inicio."

  enable_terminal:
    name: Activar terminal web
    description: Activar botón de terminal web dentro de Home Assistant (Ingress) mediante ttyd

  terminal_port:
    name: Puerto del terminal
    description: Puerto para el terminal web (predeterminado 7681). Cambie si este puerto entra en conflicto con otro servicio.

  web_interface:
    name: Interfaz web del Gateway
    description: Hermes Control UI (hermes dashboard) para chat, gestión del gateway y acceso HTTPS en modo lan_https.
    fields:
      enable_web_interface:
        name: Activar interfaz web del Gateway
        description: Permite el dashboard Hermes en el complemento (requerido para Open Gateway Web UI y comprobaciones /api/status).
      auto_start_with_integration:
        name: Inicio automático con el complemento
        description: Inicia hermes dashboard al arrancar el complemento (modo gateway local). Desactivar = solo gateway de mensajería.

  gateway_access:
    name: Acceso al Gateway
    description: Acceso de red, autenticación y configuración de la API Assist para el gateway de Hermes.
    fields:
      access_mode:
        name: Modo de acceso
        description: "Simplifica la configuración de acceso seguro. Anula bind/auth cuando no es Personalizado."
        options:
          custom: "Personalizado (configuración individual)"
          local_only: "Solo local (loopback + token, solo Ingress)"
          lan_https: "LAN HTTPS (proxy HTTPS integrado — recomendado para teléfonos)"
          lan_reverse_proxy: "LAN Proxy inverso (proxy externo con auth trusted-proxy)"
          tailnet_https: "Tailscale HTTPS (Tailscale + token)"
      gateway_port:
        name: Puerto del Gateway
        description: Puerto del gateway de Hermes (predeterminado 18789).
      gateway_public_url:
        name: URL pública del Gateway
        description: URL base pública para abrir la interfaz web del Gateway en una nueva pestaña (no integrada).
      enable_openai_api:
        name: Activar API OpenAI
        description: "Activa la API Assist de Hermes (API_SERVER_ENABLED). Extended OpenAI desde HA Core: http://<LAN-IP>:8642/v1."
      gateway_mode:
        name: Modo del Gateway
        description: Local (gateway en el complemento) o remoto (conexión a gateway externo).
        options:
          local: "Local (recomendado)"
          remote: "Remoto"
      gateway_remote_url:
        name: URL del Gateway Remoto
        description: URL WebSocket cuando el Modo del Gateway es Remoto.
      gateway_bind_mode:
        name: Modo de enlace del Gateway
        description: Enlace loopback, LAN o Tailscale. Anulado por preajustes del modo de acceso.
        options:
          loopback: "Loopback (solo 127.0.0.1, más seguro)"
          lan: "LAN (todas las interfaces)"
          tailnet: "Tailnet (solo Tailscale)"
      gateway_auth_mode:
        name: Modo de autenticación del Gateway
        description: Token (predeterminado) o trusted-proxy para proxys inversos.
        options:
          token: "Token (predeterminado)"
          trusted-proxy: "Proxy de confianza (para proxys inversos)"
      gateway_trusted_proxies:
        name: Proxys de confianza del Gateway
        description: "Lista de IP/CIDR de reverse proxy de confianza para gateway_auth_mode trusted-proxy (una fila por proxy). Requerido con access_mode lan_reverse_proxy o proxy externo (NPM, Caddy, Traefik). Si está vacío en lan_reverse_proxy, el inicio aplica valores por defecto (127.0.0.1, 172.30.0.0/16, 10.0.0.0/8). El proxy debe enviar X-Forwarded-User."
        fields:
          value:
            name: IP o CIDR del proxy
            description: "IPv4, IPv4/CIDR o IPv6/CIDR del origen del proxy. Ejemplos: 127.0.0.1, 192.168.88.0/24, 172.30.0.0/16."
      gateway_additional_allowed_origins:
        name: Orígenes permitidos adicionales
        description: "Orígenes de navegador adicionales para la Control UI de Hermes (una fila por origen). Se combinan con los valores predeterminados en gateway.controlUi.allowedOrigins. En lan_https, los hostnames también se añaden al SAN del certificado TLS."
        fields:
          value:
            name: URL de origen
            description: "Origen completo con esquema y host (incluya el puerto si no es el predeterminado). Ejemplos: https://ha.example.com:8443, https://homeassistant.local:8123, capacitor://localhost."
      controlui_disable_device_auth:
        name: Desactivar emparejamiento por dispositivo en Control UI (lan_https)
        description: "Recomendado ACTIVADO para LAN doméstica — omite aprobación por dispositivo (evita error 1008)."

  mqtt_settings:
    name: Sensores de estado MQTT
    description: Conexión al broker y publicación de sensores de estado de Home Assistant (MQTT discovery + /status.json).
    fields:
      broker_host:
        name: Host del broker MQTT
        description: "IP o nombre de host del broker. Déjelo vacío para autodetectar Mosquitto (supervisor/bashio/loopback)."
      broker_port:
        name: Puerto del broker MQTT
        description: Puerto del broker MQTT (predeterminado 1883).
      broker_username:
        name: Usuario MQTT
        description: Usuario Mosquitto opcional (dejar vacío si la autenticación está desactivada).
      broker_password:
        name: Contraseña MQTT
        description: Contraseña Mosquitto opcional. Enmascarada tras guardar. Persistida en /config/secrets/mqtt.password.
      enable_ha_status_sensors:
        name: Sensores de estado HA
        description: Publica configuración, salud del gateway, modelo/proveedor y métricas de uso a Home Assistant.
      publish_mqtt_discovery:
        name: Publicar MQTT discovery
        description: Crear entidades HA una vez por versión del complemento (marcador /config/.hermes/.mqtt_discovery_published). Desactivar para usar solo /status.json.
      status_poll_interval_seconds:
        name: Intervalo de estado (segundos)
        description: Intervalo de actualización para sensores y /share/hermes/status.json (30-300).
      state_prefix:
        name: Prefijo de topics MQTT
        description: "Prefijo para topics de estado (predeterminado hermes). Ejemplo: hermes/status/gateway_running."

  router_ssh:
    name: SSH del router
    description: Acceso SSH opcional a un router o dispositivo de red accesible desde la LAN del host HA.
    fields:
      host:
        name: Host SSH del router
        description: Nombre de host o dirección IP del router/firewall.
      user:
        name: Usuario SSH del router
        description: Nombre de usuario SSH para acceso al router.
      key_path:
        name: Ruta de clave SSH del router
        description: Ruta a la clave privada en almacenamiento persistente (predeterminado /config/keys/router_ssh).

  tools_bootstrap:
    name: Bootstrap de herramientas
    description: Verificar e instalar automáticamente dependencias opcionales de herramientas Hermes al inicio.
    fields:
      tool_telegram_enabled:
        name: Activar bootstrap de herramienta Telegram
        description: Instalar automáticamente dependencias Python de Telegram cuando falten.
      tool_browser_enabled:
        name: Activar bootstrap de herramienta Browser
        description: Instalar automáticamente dependencias del navegador (p. ej. agent-browser) cuando falten.
      tool_skills_hub_enabled:
        name: Activar bootstrap de Skills Hub
        description: Inicializar el directorio de Skills Hub al inicio (como `hermes skills list` en el primer arranque).

  advanced_settings:
    name: Configuración avanzada
    description: Proxy, DNS, logs de nginx, variables de entorno del gateway, versión de Hermes y limpieza de bloqueos de sesión.
    fields:
      http_proxy:
        name: Proxy HTTP de salida
        description: URL de proxy opcional para HTTP/HTTPS saliente (ejemplo http://192.168.2.1:3128).
      force_ipv4_dns:
        name: Forzar orden DNS IPv4
        description: Recomendado ACTIVADO en HAOS — evita timeouts de salida IPv6 para web_fetch y Telegram.
      nginx_log_level:
        name: Nivel de log Nginx
        description: Verbosidad del log de acceso del proxy HTTPS integrado.
        options:
          minimal: "Mínimo (suprimir ruido de polling HA)"
          full: "Completo (registrar todas las solicitudes)"
      gateway_env_vars:
        name: Variables de entorno del Gateway
        description: Variables de entorno adicionales para el proceso del gateway (máx. 50 entradas).
      hermes_agent_version_preset:
        name: Versión de Hermes Agent
        description: Paquete npm para la CLI `hermes` — latest o versión personalizada.
        options:
          latest: "Latest (npm @latest)"
          custom: "Versión personalizada (predeterminado 0.16.0)"
      hermes_agent_version_custom:
        name: Versión de Hermes Agent (personalizada)
        description: dist-tag npm o semver cuando el preajuste es personalizado (predeterminado 0.16.0).
      clean_session_locks_on_start:
        name: Limpiar bloqueos de sesión al iniciar
        description: Eliminar archivos de bloqueo de sesión obsoletos cuando el complemento inicia.
      clean_session_locks_on_exit:
        name: Limpiar bloqueos de sesión al salir
        description: Eliminar archivos de bloqueo de sesión al apagar correctamente.
