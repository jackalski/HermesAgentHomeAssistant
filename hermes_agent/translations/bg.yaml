configuration:
  timezone:
    name: Часова зона
    description: Часова зона за добавката (напр. Europe/Sofia, America/New_York)
  
  enable_terminal:
    name: Активиране на уеб терминал
    description: Активиране на уеб терминал бутона в Home Assistant (Ingress) чрез ttyd
  
  terminal_port:
    name: Порт на терминал
    description: Номер на порт за уеб терминала (по подразбиране - 7681). Променете, ако този порт е в конфликт с друга услуга.
  
  gateway_public_url:
    name: Публичен URL на Gateway
    description: Публичен базов URL за отваряне на Gateway уеб интерфейса в нов таб (не вграден). Пример - https://example.duckdns.org:12345 или http://192.168.1.10:18789
  
  hass_url:
    name: Home Assistant URL
    description: "Базов URL на Home Assistant за скриптове/инструменти. Оставете празно за автоматично откриване на HAOS (препоръчително). Синхронизира се като HOMEASSISTANT_URL в /config/.hermes/.env при зададен токен."

  homeassistant_token:
    name: Home Assistant токен
    description: Дълготраен токен за MCP и HA скриптове. Скрит след запис. Синхронизира се в /config/secrets/homeassistant.token и /config/.hermes/.env при рестарт.

  setup_profile:
    name: Профил за настройка
    description: "Предустановка за първо стартиране. home_assistant включва LAN HTTPS, auto MCP при зададен токен и bootstrap на model/browser/timezone. general използва local-only. advanced използва само отделните опции."
    options:
      home_assistant: "Home Assistant (препоръчително)"
      general: "Общ асистент"
      advanced: "Разширено (ръчни опции)"

  default_model_preset:
    name: Предустановка за модел
    description: "Куриран основен модел за първо стартиране. auto извежда от първия API ключ; custom използва полето Модел (custom)."
    options:
      auto: "Auto (от API ключ)"
      gemini_flash: "Gemini 2.5 Flash (OpenRouter)"
      claude_sonnet: "Claude Sonnet 4 (OpenRouter)"
      gpt_mini: "GPT-4.1 Mini (OpenRouter)"
      custom: "Персонален model ID"

  default_model:
    name: Модел (custom)
    description: "Model ID при предустановка custom. Bootstrap само при първо стартиране, ако няма конфигуриран модел."

  firecrawl_api_key:
    name: Firecrawl API ключ
    description: "Опционален токен за web search, синхронизиран като FIRECRAWL_API_KEY в /config/.hermes/.env."

  searxng_url:
    name: SearXNG URL
    description: "Опционален SearXNG URL, синхронизиран като SEARXNG_URL в /config/.hermes/.env."

  http_proxy:
    name: Изходящ HTTP прокси
    description: Опционално - URL на прокси за изходящи HTTP/HTTPS заявки (пример - http://192.168.2.1:3128)
  
  router_ssh_host:
    name: SSH хост на рутер
    description: Опционално - SSH име на хост или IP адрес на рутер/защитна стена
  
  router_ssh_user:
    name: SSH потребител на рутер
    description: Опционално - SSH потребителско име за рутер/защитна стена
  
  router_ssh_key_path:
    name: Път до SSH ключ на рутер
    description: Път до SSH частен ключ за достъп до рутер (по подразбиране - /data/keys/router_ssh)
  
  clean_session_locks_on_start:
    name: Изчистване на заключвания при стартиране
    description: Изчистване на остарели заключващи файлове на сесии след срив/рестарт при стартиране на добавката
  
  clean_session_locks_on_exit:
    name: Изчистване на заключвания при изход
    description: Изчистване на заключващи файлове на сесии при нормално спиране на добавката
  
  gateway_mode:
    name: Режим на Gateway
    description: Режим на работа на Gateway - local (локално изпълнение на gateway, препоръчително) или remote (свързване към отдалечен gateway)
    options:
      local: "Локален (препоръчително)"
      remote: "Отдалечен"

  gateway_remote_url:
    name: URL на отдалечен Gateway
    description: WebSocket URL на отдалечения gateway, използван когато Gateway Mode е remote (пример - ws://192.168.1.20:18789 или wss://gateway.example.com:443)

  gateway_additional_allowed_origins:
    name: Допълнителни разрешени origins
    description: Допълнителни origins за Control UI, разделени със запетая; сливат се в gateway.controlUi.allowedOrigins при lan_https (пример - https://ha.example.com:8443,capacitor://localhost)

  controlui_disable_device_auth:
    name: Изключи device pairing за Control UI (lan_https)
    description: "Когато е ВКЛ. (препоръчително), задава gateway.controlUi.dangerouslyDisableDeviceAuth=true и пропуска одобрението по устройство, за да избегне error 1008 в LAN HTTPS режим. Остави ВКЛ. за домашна/доверена мрежа. Изключи само ако искаш стриктно pairing потвърждение за всеки нов браузър/устройство."

  gateway_bind_mode:
    name: Режим на свързване на Gateway
    description: Режим на мрежово свързване - loopback (само 127.0.0.1, най-сигурен), lan (всички интерфейси) или tailnet (само Tailscale интерфейс). Пренебрегва се от предварителните режими на достъп.
    options:
      loopback: "Loopback (само 127.0.0.1, най-сигурен)"
      lan: "LAN (всички интерфейси)"
      tailnet: "Tailnet (само Tailscale)"

  gateway_port:
    name: Порт на Gateway
    description: Номер на порт, на който Hermes Agent gateway да слуша (по подразбиране - 18789)

  access_mode:
    name: Режим на достъп
    description: "Опростява настройката на сигурен достъп. Пренебрегва gateway_bind_mode и gateway_auth_mode, когато не е зададен на Потребителски."
    options:
      custom: "Потребителски (индивидуални настройки)"
      local_only: "Само локален (loopback + token, само Ingress)"
      lan_https: "LAN HTTPS (вграден HTTPS прокси — препоръчително за телефони)"
      lan_reverse_proxy: "LAN Reverse Proxy (външен прокси с trusted-proxy удостоверяване)"
      tailnet_https: "Tailscale HTTPS (Tailscale + token)"

  gateway_auth_mode:
    name: Режим на удостоверяване на Gateway
    description: Режим на удостоверяване - token (по подразбиране) или trusted-proxy (за HTTPS reverse proxy). Пренебрегва се, когато access_mode не е Потребителски.
    options:
      token: "Token (по подразбиране)"
      trusted-proxy: "Доверен прокси (за reverse proxy)"

  gateway_trusted_proxies:
    name: Доверени прокси на Gateway
    description: Списък с доверени прокси IP/CIDR, разделени със запетая, за trusted-proxy режим (пример - 127.0.0.1,192.168.88.0/24).

  enable_openai_api:
    name: Активиране на OpenAI API
    description: Активиране на OpenAI-съвместим Chat Completions ендпойнт. Позволява използването на Hermes Agent като разговорен агент в HA Assist pipeline чрез Extended OpenAI Conversation (HACS) или всеки OpenAI-съвместим клиент.
  enable_ha_status_sensors:
    name: HA статус сензори
    description: "Публикува настройка, здраве на gateway, модел/доставчик и метрики за употреба към Home Assistant чрез MQTT discovery (при Mosquitto) и безопасен /status.json snapshot през Ingress."
  publish_mqtt_discovery:
    name: MQTT discovery
    description: "Когато е ВКЛ и Mosquitto add-on работи, автоматично създава HA entities за Hermes статус. Изключете, ако искате само /status.json API."
  status_poll_interval_seconds:
    name: Интервал на статус (секунди)
    description: "Колко често да се обновяват сензорите и /share/hermes/status.json. Диапазон 30-300. По-високи стойности намаляват записи на флаш при SD карти."
  mqtt_state_prefix:
    name: MQTT префикс на topics
    description: "Префикс за MQTT state topics (по подразбиране hermes). Пример: <prefix>/status/gateway_running."
  force_ipv4_dns:
    name: Принудителен IPv4 DNS ред
    description: Принудително задава IPv4-приоритет при DNS резолв. Повечето HAOS VM нямат IPv6 изход — предизвиква web_fetch и Telegram грешки. Препоръчително ВКЛЮЧЕНО (по подразбиране).
  nginx_log_level:
    name: Nginx ниво на логове
    description: "Подробност на логовете на nginx проксито. 'minimal' (по подразбиране) потиска повтарящи се HA health-check заявки. 'full' логва всичко."
    options:
      minimal: "Минимално (потискане на HA polling шум)"
      full: "Пълно (логване на всички заявки)"
  gateway_env_vars:
    name: Променливи на средата за Gateway
    description: Променливи на средата, предавани на Hermes Agent gateway процеса при стартиране (списък от записи name/value в Home Assistant UI; макс. 50 променливи, ключове до 255 знака, стойности до 10000 знака).
  auto_configure_mcp:
    name: Автоматично конфигуриране на MCP за Home Assistant
    description: "Когато е ВКЛ. и Home Assistant Token е зададен, автоматично регистрира Home Assistant във вграденото MCP на Hermes (mcp_servers) при всяко стартиране. Това позволява на Hermes Agent да контролира HA устройства, услуги и автоматизации чрез Model Context Protocol. Изключете само ако управлявате MCP конфигурацията на Hermes ръчно."
  hermes_agent_version_preset:
    name: Hermes Agent version
    description: "npm package version installed on startup (provides the `hermes` CLI). Use a pinned release for stability; latest tracks upstream."
    options:
      latest: "Latest (npm @latest)"
      0.15.2: "0.15.2 (pinned)"
      0.15.1: "0.15.1 (pinned)"
      0.14.0: "0.14.0 (pinned)"
      custom: "Custom version tag"

  hermes_agent_version_custom:
    name: Hermes Agent version (custom)
    description: "npm dist-tag or semver when Hermes Agent Version is custom (e.g. 0.15.2). Applied on next add-on restart."

  tool_telegram_enabled:
    name: Telegram tool bootstrap
    description: "When ON, startup verifies Telegram dependencies and auto-installs missing python-telegram-bot package when possible."
  tool_browser_enabled:
    name: Browser tool bootstrap
    description: "When ON, startup verifies browser dependencies and auto-installs missing external tools (for example agent-browser) when possible."
  tool_skills_hub_enabled:
    name: Skills Hub bootstrap
    description: "When ON, startup initializes Skills Hub directory automatically (equivalent to first-run `hermes skills list`)."
  openai_api_key:
    name: OpenAI API ключ
    description: "Опционален токен, синхронизиран в /config/.hermes/.env като OPENAI_API_KEY за Hermes onboard/model setup и runtime."
  openrouter_api_key:
    name: OpenRouter API ключ
    description: "Опционален токен, синхронизиран в /config/.hermes/.env като OPENROUTER_API_KEY за Hermes onboard/model setup и runtime."
  anthropic_api_key:
    name: Anthropic API ключ
    description: "Опционален токен, синхронизиран в /config/.hermes/.env като ANTHROPIC_API_KEY за Hermes onboard/model setup и runtime."
  google_api_key:
    name: Google API ключ
    description: "Опционален токен, синхронизиран в /config/.hermes/.env като GOOGLE_API_KEY за Hermes onboard/model setup и runtime."
  minimax_api_key:
    name: MiniMax API ключ
    description: "Опционален токен, синхронизиран в /config/.hermes/.env като MINIMAX_API_KEY за Hermes onboard/model setup и runtime."
  discord_bot_token:
    name: Discord Bot Token
    description: "Опционален токен, синхронизиран в /config/.hermes/.env като DISCORD_BOT_TOKEN за Discord инструменти."
  github_token:
    name: GitHub Token
    description: "Опционален токен, синхронизиран в /config/.hermes/.env като GITHUB_TOKEN за по-добри API лимити."
  xai_api_key:
    name: xAI API ключ
    description: "Опционален токен, синхронизиран в /config/.hermes/.env като XAI_API_KEY за x_search."
