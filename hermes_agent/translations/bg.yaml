configuration:
  timezone:
    name: Часова зона
    description: Часова зона за добавката (напр. Europe/Sofia, America/New_York)

  addon_log_level:
    name: Add-on Log Level
    description: Startup log verbosity for the add-on container (colors and emojis when the log terminal is interactive).
    options:
      error: "Errors only"
      warn: "Warnings and errors"
      info: "Info (default)"
      debug: "Debug (verbose)"

  setup_profile:
    name: Профил за настройка
    description: "First-run preset. home_assistant enables LAN HTTPS, auto MCP when token is set, and bootstraps model/browser/timezone. general uses local-only access. advanced uses individual options only."
    options:
      home_assistant: "Home Assistant (препоръчително)"
      general: "Общ асистент"
      advanced: "Разширено (ръчни опции)"

  default_provider:
    name: Предустановен доставчик
    description: "Основен LLM доставчик за първо стартиране. Nous Portal използва OAuth (`hermes setup --portal` или `hermes auth add nous` в терминала). Ollama съответства на Ollama Cloud (`ollama-cloud`)."
    options:
      nous: "Nous Portal"
      openrouter: "OpenRouter"
      google: "Google (Gemini API ключ)"
      anthropic: "Anthropic"
      ollama: "Ollama Cloud"
      minimax: "MiniMax"
      xai: "xAI (Grok)"
      openai: "OpenAI"

  default_model_preset:
    name: Предустановка за модел
    description: "Използвайте Custom и задайте ID на модела в полето Предустановен модел."
    options:
      custom: "Персонален model ID"

  default_model:
    name: Предустановен модел
    description: "ID на модела за избрания доставчик (напр. google/gemini-2.5-flash за OpenRouter, claude-sonnet-4-6 за Anthropic, gpt-oss:120b за Ollama Cloud). Bootstrap само при първо стартиране, ако няма конфигуриран модел."

  provider_api_keys:
    name: Provider API Keys
    description: Optional provider and tool tokens synced to /config/.hermes/.env on restart. OAuth/device-code providers still require `hermes auth` in terminal.
    fields:
      openai_api_key:
        name: OpenAI API Key
        description: Synced as OPENAI_API_KEY.
      openrouter_api_key:
        name: OpenRouter API Key
        description: Synced as OPENROUTER_API_KEY.
      anthropic_api_key:
        name: Anthropic API Key
        description: Synced as ANTHROPIC_API_KEY.
      google_api_key:
        name: Google API Key
        description: Synced as GOOGLE_API_KEY.
      ollama_api_key:
        name: Ollama Cloud API Key
        description: Synced as OLLAMA_API_KEY (from ollama.com/settings/keys).
      minimax_api_key:
        name: MiniMax API Key
        description: Synced as MINIMAX_API_KEY.
      discord_bot_token:
        name: Discord Bot Token
        description: Synced as DISCORD_BOT_TOKEN.
      github_token:
        name: GitHub Token
        description: Synced as GITHUB_TOKEN.
      xai_api_key:
        name: xAI API Key
        description: Synced as XAI_API_KEY.
      firecrawl_api_key:
        name: Firecrawl API Key
        description: Synced as FIRECRAWL_API_KEY.
      searxng_url:
        name: SearXNG URL
        description: Synced as SEARXNG_URL.

  home_assistant:
    name: Home Assistant Integration
    description: Connect Hermes to your Home Assistant instance for MCP, scripts, and autodetection.
    fields:
      hass_url:
        name: Home Assistant URL
        description: "Leave empty for autodetection on HAOS (recommended). Synced to HOMEASSISTANT_URL in /config/.hermes/.env when a token is set."
      homeassistant_token:
        name: Home Assistant Token
        description: Long-lived access token for MCP and HA scripts. Masked after save; persisted under /config/secrets/homeassistant.token.
      auto_configure_mcp:
        name: Auto-Configure MCP for Home Assistant
        description: "When ON and token is set, registers Home Assistant in Hermes MCP (mcp_servers) on each startup."

  enable_terminal:
    name: Активиране на уеб терминал
    description: Активиране на уеб терминал бутона в Home Assistant (Ingress) чрез ttyd

  terminal_port:
    name: Порт на терминал
    description: Port for the web terminal (default 7681). Change if this port conflicts with another service.

  web_interface:
    name: Gateway Web Interface
    description: Hermes Control UI (hermes dashboard) for chat, gateway management, and HTTPS access in lan_https mode.
    fields:
      enable_web_interface:
        name: Enable Gateway Web UI
        description: Allow the Hermes dashboard Web UI to run inside the add-on (required for Open Gateway Web UI and /api/status health checks).
      auto_start_with_integration:
        name: Auto-Start With Add-on
        description: Start hermes dashboard automatically when the add-on starts (local gateway mode). Turn OFF to start the messaging gateway only.

  gateway_access:
    name: Gateway Access
    description: Network access, authentication, and Assist API settings for the Hermes gateway.
    fields:
      access_mode:
        name: Режим на достъп
        description: "Simplifies secure access. Overrides bind/auth settings when not Custom."
        options:
          custom: "Потребителски (индивидуални настройки)"
          local_only: "Само локален (loopback + token, само Ingress)"
          lan_https: "LAN HTTPS (вграден HTTPS прокси — препоръчително за телефони)"
          lan_reverse_proxy: "LAN Reverse Proxy (външен прокси с trusted-proxy удостоверяване)"
          tailnet_https: "Tailscale HTTPS (Tailscale + token)"
      gateway_port:
        name: Порт на Gateway
        description: Port for the Hermes gateway (default 18789).
      gateway_public_url:
        name: Публичен URL на Gateway
        description: Public base URL for opening the Gateway Web UI in a new tab (not embedded).
      enable_openai_api:
        name: Активиране на OpenAI API
        description: "Enables Hermes Assist API (API_SERVER_ENABLED). Extended OpenAI from HA Core: http://<LAN-IP>:8642/v1."
      gateway_mode:
        name: Режим на Gateway
        description: Local (run gateway in add-on) or remote (connect to external gateway).
        options:
          local: "Локален (препоръчително)"
          remote: "Отдалечен"
      gateway_remote_url:
        name: URL на отдалечен Gateway
        description: WebSocket URL when Gateway Mode is Remote.
      gateway_bind_mode:
        name: Режим на свързване на Gateway
        description: Loopback, LAN, or Tailscale bind. Overridden by Access Mode presets.
        options:
          loopback: "Loopback (само 127.0.0.1, най-сигурен)"
          lan: "LAN (всички интерфейси)"
          tailnet: "Tailnet (само Tailscale)"
      gateway_auth_mode:
        name: Режим на удостоверяване на Gateway
        description: Token (default) or trusted-proxy for reverse proxies.
        options:
          token: "Token (по подразбиране)"
          trusted-proxy: "Доверен прокси (за reverse proxy)"
      gateway_trusted_proxies:
        name: Доверени прокси на Gateway
        description: "Trusted reverse-proxy IP/CIDR list for gateway_auth_mode trusted-proxy (one row per proxy). Required when access_mode is lan_reverse_proxy or you use an external proxy (NPM, Caddy, Traefik). If empty in lan_reverse_proxy, startup applies defaults (127.0.0.1, 172.30.0.0/16, 10.0.0.0/8). Your proxy must send X-Forwarded-User."
        fields:
          value:
            name: Proxy IP or CIDR
            description: "IPv4, IPv4/CIDR, or IPv6/CIDR of the proxy source. Examples: 127.0.0.1, 192.168.88.0/24, 172.30.0.0/16."
      gateway_additional_allowed_origins:
        name: Допълнителни разрешени origins
        description: "Extra browser origins allowed to open the Hermes Control UI (one row per origin). Merged with built-in defaults into gateway.controlUi.allowedOrigins. In lan_https, hostnames from these URLs are also added to the TLS certificate SAN."
        fields:
          value:
            name: Origin URL
            description: "Full origin with scheme and host (include port when non-default). Examples: https://ha.example.com:8443, https://homeassistant.local:8123, capacitor://localhost."
      controlui_disable_device_auth:
        name: Изключи device pairing за Control UI (lan_https)
        description: "Recommended ON for home LAN — skips per-device approval (avoids error 1008)."

  mqtt_settings:
    name: MQTT Status Sensors
    description: Broker connection and Home Assistant status sensor publishing (MQTT discovery + /status.json).
    fields:
      broker_host:
        name: MQTT Broker Host
        description: "Broker IP or hostname. Leave empty to autodetect Mosquitto (supervisor/bashio/loopback)."
      broker_port:
        name: MQTT Broker Port
        description: MQTT broker port (default 1883).
      broker_username:
        name: MQTT Username
        description: Optional Mosquitto username (leave empty when auth is disabled).
      broker_password:
        name: MQTT Password
        description: Optional Mosquitto password. Masked after save; persisted under /config/secrets/mqtt.password.
      enable_ha_status_sensors:
        name: HA статус сензори
        description: Publish setup, gateway health, model/provider, and usage metrics to Home Assistant.
      publish_mqtt_discovery:
        name: MQTT discovery
        description: Auto-create HA entities once per add-on version (marker /config/.hermes/.mqtt_discovery_published). Disable to use /status.json only.
      status_poll_interval_seconds:
        name: Интервал на статус (секунди)
        description: Refresh interval for sensors and /share/hermes/status.json (30-300).
      state_prefix:
        name: MQTT префикс на topics
        description: "Prefix for state topics (default hermes). Example: hermes/status/gateway_running."

  router_ssh:
    name: Router SSH
    description: Optional SSH access to a router or network device reachable from the HA host LAN.
    fields:
      host:
        name: SSH хост на рутер
        description: Router/firewall SSH hostname or IP address.
      user:
        name: SSH потребител на рутер
        description: SSH username for router access.
      key_path:
        name: Път до SSH ключ на рутер
        description: Path to private key on persistent storage (default /config/keys/router_ssh).

  tools_bootstrap:
    name: Tool Bootstrap
    description: Verify and auto-install optional Hermes tool dependencies on startup.
    fields:
      tool_telegram_enabled:
        name: Enable Telegram Tool Bootstrap
        description: Auto-install Telegram Python dependencies when missing.
      tool_browser_enabled:
        name: Enable Browser Tool Bootstrap
        description: Auto-install browser tool dependencies (e.g. agent-browser) when missing.
      tool_skills_hub_enabled:
        name: Enable Skills Hub Bootstrap
        description: Initialize Skills Hub directory on startup (like first-run `hermes skills list`).

  advanced_settings:
    name: Advanced Settings
    description: Proxy, DNS, nginx logging, gateway env vars, Hermes version, and session lock cleanup.
    fields:
      http_proxy:
        name: Изходящ HTTP прокси
        description: Optional proxy URL for outbound HTTP/HTTPS (example http://192.168.2.1:3128).
      force_ipv4_dns:
        name: Принудителен IPv4 DNS ред
        description: Recommended ON on HAOS — avoids IPv6 egress timeouts for web_fetch and Telegram.
      nginx_log_level:
        name: Nginx ниво на логове
        description: Access log verbosity for the built-in HTTPS proxy.
        options:
          minimal: "Минимално (потискане на HA polling шум)"
          full: "Пълно (логване на всички заявки)"
      gateway_env_vars:
        name: Променливи на средата за Gateway
        description: Extra env vars passed to the gateway process (max 50 entries).
      hermes_agent_version_preset:
        name: Hermes Agent Version
        description: npm package for the `hermes` CLI — latest or custom pin.
        options:
          latest: "Latest (npm @latest)"
          custom: "Custom version (default 0.16.0)"
      hermes_agent_version_custom:
        name: Hermes Agent Version (custom)
        description: npm dist-tag or semver when preset is custom (default 0.16.0).
      clean_session_locks_on_start:
        name: Изчистване на заключвания при стартиране
        description: Remove stale session lock files when the add-on starts.
      clean_session_locks_on_exit:
        name: Изчистване на заключвания при изход
        description: Remove session lock files on graceful shutdown.
