configuration:
  timezone:
    name: Zeitzone
    description: Zeitzone für das Add-on (z.B. Europe/Sofia, America/New_York)

  addon_log_level:
    name: Add-on Log-Level
    description: Start-Log-Detailgrad für den Add-on-Container (Farben und Emojis, wenn das Log-Terminal interaktiv ist).
    options:
      error: "Nur Fehler"
      warn: "Warnungen und Fehler"
      info: "Info (Standard)"
      debug: "Debug (ausführlich)"

  setup_profile:
    name: Setup-Profil
    description: "Erststart-Preset. home_assistant aktiviert LAN HTTPS, Auto-MCP bei gesetztem Token und bootstrap für Model/Browser/Zeitzone. general nutzt nur lokalen Zugriff. advanced nutzt nur Einzeloptionen."
    options:
      home_assistant: "Home Assistant (empfohlen)"
      general: "Allgemeiner Assistent"
      advanced: "Erweitert (manuelle Optionen)"

  default_provider:
    name: Standard-Provider
    description: "Haupt-LLM-Provider für Erststart-Bootstrap. Nous Portal nutzt OAuth (`hermes setup --portal` oder `hermes auth add nous` im Terminal). Ollama entspricht Ollama Cloud (`ollama-cloud`)."
    options:
      nous: "Nous Portal"
      openrouter: "OpenRouter"
      google: "Google (Gemini API-Schlüssel)"
      anthropic: "Anthropic"
      ollama: "Ollama Cloud"
      minimax: "MiniMax"
      xai: "xAI (Grok)"
      openai: "OpenAI"

  default_model_preset:
    name: Modell-Voreinstellung
    description: "Custom wählen und die Modell-ID unter Standardmodell setzen."
    options:
      custom: "Benutzerdefinierte Modell-ID"

  default_model:
    name: Standardmodell
    description: "Modell-ID für den gewählten Provider (z. B. google/gemini-2.5-flash für OpenRouter, claude-sonnet-4-6 für Anthropic, gpt-oss:120b für Ollama Cloud). Bootstrap nur beim Erststart, wenn kein Modell konfiguriert ist."

  provider_api_keys:
    name: Provider-API-Schlüssel
    description: Optionale Provider- und Tool-Tokens, die beim Neustart nach /config/.hermes/.env synchronisiert werden. OAuth-/Device-Code-Provider erfordern weiterhin `hermes auth` im Terminal.
    fields:
      openai_api_key:
        name: OpenAI API-Schlüssel
        description: Synchronisiert als OPENAI_API_KEY.
      openrouter_api_key:
        name: OpenRouter API-Schlüssel
        description: Synchronisiert als OPENROUTER_API_KEY.
      anthropic_api_key:
        name: Anthropic API-Schlüssel
        description: Synchronisiert als ANTHROPIC_API_KEY.
      google_api_key:
        name: Google API-Schlüssel
        description: Synchronisiert als GOOGLE_API_KEY.
      ollama_api_key:
        name: Ollama Cloud API-Schlüssel
        description: Synchronisiert als OLLAMA_API_KEY (von ollama.com/settings/keys).
      minimax_api_key:
        name: MiniMax API-Schlüssel
        description: Synchronisiert als MINIMAX_API_KEY.
      discord_bot_token:
        name: Discord Bot Token
        description: Synchronisiert als DISCORD_BOT_TOKEN.
      github_token:
        name: GitHub Token
        description: Synchronisiert als GITHUB_TOKEN.
      xai_api_key:
        name: xAI API-Schlüssel
        description: Synchronisiert als XAI_API_KEY.
      firecrawl_api_key:
        name: Firecrawl API-Schlüssel
        description: Synchronisiert als FIRECRAWL_API_KEY.
      searxng_url:
        name: SearXNG URL
        description: Synchronisiert als SEARXNG_URL.

  home_assistant:
    name: Home Assistant Integration
    description: Verbindet Hermes mit Ihrer Home Assistant-Instanz für MCP, Skripte und Autodetektion. Jedes Feld unten hat einen passenden Test in der Add-on-Web-Oberfläche (Verbindungstests).
    fields:
      hass_url:
        name: Home Assistant URL
        description: "Leer lassen für Autodetektion auf HAOS (empfohlen). Wird als HOMEASSISTANT_URL in /config/.hermes/.env synchronisiert, wenn ein Token gesetzt ist. Nach dem Speichern: Verbindungstests → Test URL."
      homeassistant_token:
        name: Home Assistant Token
        description: Langlebiger Zugriffstoken für MCP und HA-Skripte. Nach dem Speichern maskiert. Gespeichert unter /config/secrets/homeassistant.token. Verbindungstests → Test Token.
      auto_configure_mcp:
        name: MCP für Home Assistant automatisch konfigurieren
        description: "Wenn AN und Token gesetzt ist, wird Home Assistant bei jedem Start in Hermes MCP (mcp_servers) registriert. Nach Neustart: Verbindungstests → Test MCP."

  enable_terminal:
    name: Web-Terminal aktivieren
    description: Web-Terminal-Schaltfläche in Home Assistant (Ingress) über ttyd aktivieren. Verbindungstests → Test Terminal.

  terminal_port:
    name: Terminal-Port
    description: Port für das Web-Terminal (Standard 7681). Verbindungstests → Test Terminal.

  web_interface:
    name: Hermes Web UI
    description: Hermes-Admin-Oberfläche (hermes dashboard). Externes HTTPS auf gateway_port. Jedes Feld hat einen Test in der Add-on-Web-Oberfläche.
    fields:
      enable_web_interface:
        name: Hermes Web UI aktivieren
        description: Startet hermes dashboard im Add-on. Verbindungstests → Test Dashboard.
      auto_start_with_integration:
        name: Mit Add-on automatisch starten
        description: Startet hermes dashboard beim Add-on-Start. Erforderlich für Verbindungstests → Test Dashboard.
      dashboard_port:
        name: Dashboard-Loopback-Port
        description: "Nur Loopback-Offset (Prozess lauscht auf dashboard_port + 1 in lan_https). Externes HTTPS nur auf gateway_port."

  gateway_access:
    name: Gateway-Zugriff
    description: Netzwerkzugriff, Authentifizierung und Assist-API-Einstellungen. Jedes relevante Feld hat einen Test in der Add-on-Web-Oberfläche.
    fields:
      access_mode:
        name: Zugriffsmodus
        description: "Vereinfacht die sichere Zugriffskonfiguration. Überschreibt Bind-/Auth-Einstellungen wenn nicht Benutzerdefiniert."
        options:
          custom: "Benutzerdefiniert (individuelle Einstellungen)"
          local_only: "Nur lokal (Loopback + Token, nur Ingress)"
          lan_https: "LAN HTTPS (eingebauter HTTPS-Proxy — empfohlen für Smartphones)"
          lan_reverse_proxy: "LAN Reverse-Proxy (externer Proxy mit Trusted-Proxy-Auth)"
          tailnet_https: "Tailscale HTTPS (Tailscale-Bindung + Token)"
      gateway_port:
        name: Gateway-Port
        description: HTTPS-Port für Hermes Web UI (Standard 18789). Verbindungstests → Test Web UI HTTPS (lan_https).
      gateway_public_url:
        name: Öffentliche Gateway-URL
        description: Öffentliche Basis-URL zum Öffnen der Hermes Web UI in einem neuen Tab (nicht eingebettet).
      enable_openai_api:
        name: OpenAI API aktivieren
        description: "Aktiviert Hermes Assist API (API_SERVER_ENABLED). Nach Neustart: Verbindungstests → Test Assist API."
      gateway_mode:
        name: Gateway-Modus
        description: Lokal (Test Gateway) oder remote (Test Remote).
        options:
          local: "Lokal (empfohlen)"
          remote: "Remote"
      gateway_remote_url:
        name: Remote Gateway-URL
        description: WebSocket-URL wenn Gateway-Modus Remote ist. Verbindungstests → Test Remote.
      gateway_bind_mode:
        name: Gateway-Bindungsmodus
        description: Loopback-, LAN- oder Tailscale-Bindung. Wird durch Zugriffsmodus-Voreinstellungen überschrieben.
        options:
          loopback: "Loopback (nur 127.0.0.1, am sichersten)"
          lan: "LAN (alle Schnittstellen)"
          tailnet: "Tailnet (nur Tailscale)"
      gateway_auth_mode:
        name: Gateway-Authentifizierungsmodus
        description: Token (Standard) oder trusted-proxy für Reverse-Proxys.
        options:
          token: "Token (Standard)"
          trusted-proxy: "Vertrauenswürdiger Proxy (für Reverse-Proxys)"
      gateway_trusted_proxies:
        name: Vertrauenswürdige Gateway-Proxys
        description: "Liste vertrauenswürdiger Reverse-Proxy-IPs/CIDRs für gateway_auth_mode trusted-proxy (eine Zeile pro Proxy). Erforderlich bei access_mode lan_reverse_proxy oder externem Proxy (NPM, Caddy, Traefik). Wenn leer bei lan_reverse_proxy, setzt der Start Standardwerte (127.0.0.1, 172.30.0.0/16, 10.0.0.0/8). Der Proxy muss X-Forwarded-User senden."
        fields:
          value:
            name: Proxy-IP oder CIDR
            description: "IPv4, IPv4/CIDR oder IPv6/CIDR der Proxy-Quelle. Beispiele: 127.0.0.1, 192.168.88.0/24, 172.30.0.0/16."
      gateway_additional_allowed_origins:
        name: Zusätzliche erlaubte Origins
        description: "Zusätzliche Browser-Origins für die Hermes Control UI (eine Zeile pro Origin). Wird mit Standardwerten in gateway.controlUi.allowedOrigins zusammengeführt. Bei lan_https werden Hostnamen auch in die TLS-Zertifikat-SAN aufgenommen."
        fields:
          value:
            name: Origin-URL
            description: "Vollständige Origin mit Schema und Host (Port bei Abweichung vom Standard). Beispiele: https://ha.example.com:8443, https://homeassistant.local:8123, capacitor://localhost."
      controlui_disable_device_auth:
        name: Control-UI-Geräte-Pairing deaktivieren (lan_https)
        description: "Empfohlen EIN für Heim-LAN — überspringt Gerätefreigabe (vermeidet Fehler 1008)."

  mqtt_settings:
    name: MQTT-Status-Sensoren
    description: Broker-Verbindung und Status-Sensoren. Jedes Broker-Feld hat einen Test in der Add-on-Web-Oberfläche.
    fields:
      broker_host:
        name: MQTT-Broker-Host
        description: "Broker-IP oder Hostname. Leer lassen für Mosquitto-Autodetektion. Verbindungstests → Test Broker."
      broker_port:
        name: MQTT-Broker-Port
        description: MQTT-Broker-Port (Standard 1883). In Verbindungstests → Test Broker enthalten.
      broker_username:
        name: MQTT-Benutzername
        description: Optionaler Mosquitto-Benutzername. Verbindungstests → Test Auth wenn gesetzt.
      broker_password:
        name: MQTT-Passwort
        description: Optionales Mosquitto-Passwort. Verbindungstests → Test Auth.
      enable_ha_status_sensors:
        name: HA-Status-Sensoren aktivieren
        description: Veröffentlicht Setup, Gateway-Status, Modell/Provider und Nutzungsmetriken an Home Assistant.
      publish_mqtt_discovery:
        name: MQTT Discovery veröffentlichen
        description: HA-Entities einmal pro Add-on-Version erstellen (Marker /config/.hermes/.mqtt_discovery_published). Deaktivieren für nur /status.json.
      status_poll_interval_seconds:
        name: Status-Aktualisierungsintervall (Sekunden)
        description: Aktualisierungsintervall für Sensoren und /share/hermes/status.json (30-300).
      state_prefix:
        name: MQTT State-Topic-Präfix
        description: "Präfix für State-Topics (Standard hermes). Beispiel: hermes/status/gateway_running."

  router_ssh:
    name: Router SSH
    description: Optionaler SSH-Zugriff auf einen Router oder ein Netzwerkgerät im LAN des HA-Hosts.
    fields:
      host:
        name: Router SSH-Host
        description: SSH-Hostname oder IP-Adresse des Routers/der Firewall.
      user:
        name: Router SSH-Benutzer
        description: SSH-Benutzername für Router-Zugriff.
      key_path:
        name: Router SSH-Schlüsselpfad
        description: Pfad zum privaten Schlüssel auf persistentem Speicher (Standard /config/keys/router_ssh).

  tools_bootstrap:
    name: Tool-Bootstrap
    description: Optionale Hermes-Tool-Abhängigkeiten beim Start prüfen und automatisch installieren.
    fields:
      tool_telegram_enabled:
        name: Telegram-Tool-Bootstrap aktivieren
        description: Telegram-Python-Abhängigkeiten automatisch installieren wenn fehlend.
      tool_browser_enabled:
        name: Browser-Tool-Bootstrap aktivieren
        description: Browser-Tool-Abhängigkeiten automatisch installieren (z.B. agent-browser) wenn fehlend.
      tool_skills_hub_enabled:
        name: Skills-Hub-Bootstrap aktivieren
        description: Skills-Hub-Verzeichnis beim Start initialisieren (wie `hermes skills list` beim Erststart).

  advanced_settings:
    name: Erweiterte Einstellungen
    description: Proxy, DNS, Nginx-Logging, Gateway-Umgebungsvariablen, Hermes-Version und Sitzungssperren-Bereinigung.
    fields:
      http_proxy:
        name: Ausgehender HTTP-Proxy
        description: Optionale Proxy-URL für ausgehende HTTP/HTTPS (Beispiel http://192.168.2.1:3128).
      force_ipv4_dns:
        name: IPv4-DNS-Reihenfolge erzwingen
        description: Empfohlen EIN auf HAOS — vermeidet IPv6-Ausgangs-Timeouts für web_fetch und Telegram.
      nginx_log_level:
        name: Nginx Log-Level
        description: Zugriffslog-Detailgrad für den eingebauten HTTPS-Proxy.
        options:
          minimal: "Minimal (HA-Polling-Rauschen unterdrücken)"
          full: "Vollständig (alle Anfragen protokollieren)"
      gateway_env_vars:
        name: Gateway-Umgebungsvariablen
        description: Zusätzliche Umgebungsvariablen für den Gateway-Prozess (max. 50 Einträge).
      hermes_agent_version_preset:
        name: Hermes-Agent-Version
        description: npm-Paket für die `hermes`-CLI — latest oder benutzerdefinierte Version.
        options:
          latest: "Latest (npm @latest)"
          custom: "Benutzerdefinierte Version (Standard 0.17.0)"
      hermes_agent_version_custom:
        name: Hermes-Agent-Version (benutzerdefiniert)
        description: npm dist-tag oder Semver wenn Voreinstellung custom ist (Standard 0.17.0).
      clean_session_locks_on_start:
        name: Sitzungssperren beim Start bereinigen
        description: Veraltete Sitzungssperrdateien beim Start des Add-ons entfernen.
      clean_session_locks_on_exit:
        name: Sitzungssperren beim Beenden bereinigen
        description: Sitzungssperrdateien beim ordnungsgemäßen Herunterfahren entfernen.
