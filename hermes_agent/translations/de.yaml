configuration:
  timezone:
    name: Zeitzone
    description: Zeitzone für das Add-on (z.B. Europe/Sofia, America/New_York)
  
  enable_terminal:
    name: Web-Terminal aktivieren
    description: Web-Terminal-Schaltfläche in Home Assistant (Ingress) über ttyd aktivieren
  
  terminal_port:
    name: Terminal-Port
    description: Portnummer für das Web-Terminal (Standard - 7681). Ändern Sie diese, wenn dieser Port mit einem anderen Dienst in Konflikt steht.
  
  gateway_public_url:
    name: Öffentliche Gateway-URL
    description: Öffentliche Basis-URL zum Öffnen der Gateway-Weboberfläche in einem neuen Tab (nicht eingebettet). Beispiel - https://example.duckdns.org:12345 oder http://192.168.1.10:18789
  
  hass_url:
    name: Home Assistant URL
    description: "Home Assistant Basis-URL für Skripte/Tools. Leer lassen für Autodetektion auf HAOS (empfohlen). Wird als HOMEASSISTANT_URL in /config/.hermes/.env synchronisiert, wenn ein Token gesetzt ist."

  homeassistant_token:
    name: Home Assistant Token
    description: Langlebiger Zugriffstoken für MCP und HA-Skripte. Nach dem Speichern maskiert. Wird beim Neustart nach /config/secrets/homeassistant.token und /config/.hermes/.env synchronisiert.

  setup_profile:
    name: Setup-Profil
    description: "Erststart-Preset. home_assistant aktiviert LAN HTTPS, Auto-MCP bei gesetztem Token und bootstrap für Model/Browser/Zeitzone. general nutzt nur lokalen Zugriff. advanced nutzt nur Einzeloptionen."
    options:
      home_assistant: "Home Assistant (empfohlen)"
      general: "Allgemeiner Assistent"
      advanced: "Erweitert (manuelle Optionen)"

  default_model_preset:
    name: Modell-Voreinstellung
    description: "Kuratiertes Hauptmodell für Erststart-Bootstrap. auto leitet vom ersten API-Schlüssel ab; custom nutzt das Feld Modell (custom)."
    options:
      auto: "Auto (vom API-Schlüssel)"
      gemini_flash: "Gemini 2.5 Flash (OpenRouter)"
      claude_sonnet: "Claude Sonnet 4 (OpenRouter)"
      gpt_mini: "GPT-4.1 Mini (OpenRouter)"
      custom: "Benutzerdefinierte Modell-ID"

  default_model:
    name: Modell (custom)
    description: "Modell-ID bei Voreinstellung custom. Bootstrap nur beim Erststart, wenn kein Modell konfiguriert ist."

  firecrawl_api_key:
    name: Firecrawl API-Schlüssel
    description: "Optionaler Web-Search-Token, synchronisiert als FIRECRAWL_API_KEY in /config/.hermes/.env."

  searxng_url:
    name: SearXNG URL
    description: "Optionale SearXNG-URL, synchronisiert als SEARXNG_URL in /config/.hermes/.env."

  http_proxy:
    name: Ausgehender HTTP-Proxy
    description: Optional - Proxy-URL für ausgehende HTTP/HTTPS-Anfragen (Beispiel - http://192.168.2.1:3128)
  
  router_ssh_host:
    name: Router SSH-Host
    description: Optional - SSH-Hostname oder IP-Adresse des Routers/der Firewall
  
  router_ssh_user:
    name: Router SSH-Benutzer
    description: Optional - SSH-Benutzername für Router/Firewall
  
  router_ssh_key_path:
    name: Router SSH-Schlüsselpfad
    description: Pfad zum privaten SSH-Schlüssel für Router-Zugriff (Standard - /data/keys/router_ssh)
  
  clean_session_locks_on_start:
    name: Sitzungssperren beim Start bereinigen
    description: Veraltete Sitzungssperrdateien nach Abstürzen/Neustarts beim Start des Add-ons bereinigen
  
  clean_session_locks_on_exit:
    name: Sitzungssperren beim Beenden bereinigen
    description: Sitzungssperrdateien beim ordnungsgemäßen Stoppen des Add-ons bereinigen
  
  gateway_mode:
    name: Gateway-Modus
    description: Gateway-Betriebsmodus - local (Gateway lokal ausführen, empfohlen) oder remote (mit einem entfernten Gateway verbinden)
    options:
      local: "Lokal (empfohlen)"
      remote: "Remote"

  gateway_remote_url:
    name: Remote Gateway-URL
    description: Remote-Gateway-WebSocket-URL, verwendet wenn Gateway-Modus auf Remote steht (Beispiel - ws://192.168.1.20:18789 oder wss://gateway.example.com:443)

  gateway_additional_allowed_origins:
    name: Zusätzliche erlaubte Origins
    description: Kommagetrennte zusätzliche Control-UI-Origins, die bei lan_https in gateway.controlUi.allowedOrigins zusammengeführt werden (Beispiel - https://ha.example.com:8443,capacitor://localhost)

  controlui_disable_device_auth:
    name: Control-UI-Geräte-Pairing deaktivieren (lan_https)
    description: "Wenn EIN (empfohlen), setzt dies gateway.controlUi.dangerouslyDisableDeviceAuth=true, überspringt die Gerätefreigabe und vermeidet Fehler 1008 im LAN-HTTPS-Modus. Für Heim-/vertrauenswürdiges LAN eingeschaltet lassen. Nur AUS schalten, wenn du striktes Geräte-Pairing für jeden neuen Browser/jedes neue Gerät willst."

  gateway_bind_mode:
    name: Gateway-Bindungsmodus
    description: Netzwerk-Bindungsmodus - loopback (nur 127.0.0.1, am sichersten), lan (alle Schnittstellen) oder tailnet (nur Tailscale-Schnittstelle). Wird durch Zugriffsmodus-Voreinstellungen überschrieben.
    options:
      loopback: "Loopback (nur 127.0.0.1, am sichersten)"
      lan: "LAN (alle Schnittstellen)"
      tailnet: "Tailnet (nur Tailscale)"

  gateway_port:
    name: Gateway-Port
    description: Portnummer, auf der das Hermes-Agent-Gateway lauscht (Standard - 18789)

  access_mode:
    name: Zugriffsmodus
    description: "Vereinfacht die sichere Zugriffskonfiguration. Überschreibt gateway_bind_mode und gateway_auth_mode wenn nicht auf Benutzerdefiniert gesetzt."
    options:
      custom: "Benutzerdefiniert (individuelle Einstellungen)"
      local_only: "Nur lokal (Loopback + Token, nur Ingress)"
      lan_https: "LAN HTTPS (eingebauter HTTPS-Proxy — empfohlen für Smartphones)"
      lan_reverse_proxy: "LAN Reverse-Proxy (externer Proxy mit Trusted-Proxy-Auth)"
      tailnet_https: "Tailscale HTTPS (Tailscale-Bindung + Token)"

  gateway_auth_mode:
    name: Gateway-Authentifizierungsmodus
    description: Gateway-Auth-Modus - token (Standard) oder trusted-proxy (für HTTPS-Reverse-Proxys). Wird überschrieben wenn access_mode nicht Benutzerdefiniert ist.
    options:
      token: "Token (Standard)"
      trusted-proxy: "Vertrauenswürdiger Proxy (für Reverse-Proxys)"

  gateway_trusted_proxies:
    name: Vertrauenswürdige Gateway-Proxys
    description: Komma-getrennte Liste vertrauenswürdiger Proxy-IPs/CIDRs für den Trusted-Proxy-Modus (Beispiel - 127.0.0.1,192.168.88.0/24).

  enable_openai_api:
    name: OpenAI API aktivieren
    description: "Aktiviert Hermes Assist API (sync API_SERVER_ENABLED in .env; HTTP auf 0.0.0.0:8642, Bearer-Token erforderlich). Extended OpenAI von HA Core: Base URL http://<LAN-IP>:8642/v1, API-Key = Gateway-Token, Modell hermes-agent."
  enable_ha_status_sensors:
    name: HA-Status-Sensoren aktivieren
    description: "Veröffentlicht Hermes-Setup, Gateway-Status, Modell/Provider und Nutzungsmetriken an Home Assistant via MQTT Discovery (wenn Mosquitto installiert ist) und einen sicheren /status.json-Snapshot über Ingress."
  publish_mqtt_discovery:
    name: MQTT Discovery veröffentlichen
    description: "Wenn EIN und Mosquitto läuft, werden HA-Entities für Hermes-Status automatisch erstellt. Deaktivieren, wenn nur die /status.json-API gewünscht ist."
  status_poll_interval_seconds:
    name: Status-Aktualisierungsintervall (Sekunden)
    description: "Wie oft Status-Sensoren und /share/hermes/status.json aktualisiert werden. Bereich 30-300. Höhere Werte reduzieren Flash-Schreibvorgänge auf SD-Karten."
  mqtt_state_prefix:
    name: MQTT State-Topic-Präfix
    description: "Präfix für MQTT State-Topics (Standard hermes). Beispiel: <prefix>/status/gateway_running."
  force_ipv4_dns:
    name: IPv4-DNS-Reihenfolge erzwingen
    description: Erzwingt IPv4-vorrangige DNS-Auflösung. Die meisten HAOS-VMs haben keinen IPv6-Ausgang — verursacht web_fetch- und Telegram-Timeouts. Empfohlen EIN (Standard).
  nginx_log_level:
    name: Nginx Log-Level
    description: "Ausführlichkeit des Nginx-Zugriffslogs. 'minimal' (Standard) unterdrückt wiederholte HA-Healthcheck- und Polling-Anfragen. 'full' protokolliert alles."
    options:
      minimal: "Minimal (HA-Polling-Rauschen unterdrücken)"
      full: "Vollständig (alle Anfragen protokollieren)"
  gateway_env_vars:
    name: Gateway-Umgebungsvariablen
    description: Umgebungsvariablen, die beim Start an den Hermes-Agent-Gateway-Prozess übergeben werden (Liste mit name/value-Einträgen in der Home Assistant UI; max. 50 Variablen, Schlüssel bis 255 Zeichen, Werte bis 10.000 Zeichen).
  auto_configure_mcp:
    name: MCP für Home Assistant automatisch konfigurieren
    description: "Wenn AN und Home Assistant Token gesetzt ist, wird Home Assistant bei jedem Start automatisch in Hermes integriertem MCP (mcp_servers) registriert. Das erlaubt Hermes Agent, HA-Geräte, -Dienste und -Automatisierungen über das Model Context Protocol zu steuern. Nur deaktivieren, wenn Sie die Hermes-MCP-Konfiguration manuell verwalten."
  hermes_agent_version_preset:
    name: Hermes-Agent-Version
    description: "npm-Paket beim Start (stellt die `hermes`-CLI bereit). Standard custom mit 0.16.0; latest folgt npm @latest."
    options:
      latest: "Latest (npm @latest)"
      custom: "Benutzerdefinierte Version (Standard 0.16.0)"

  hermes_agent_version_custom:
    name: Hermes-Agent-Version (benutzerdefiniert)
    description: "npm-Tag oder Semver bei benutzerdefinierter Version (Standard 0.16.0). Wird beim nächsten Add-on-Neustart angewendet."

  tool_telegram_enabled:
    name: Telegram-Tool-Bootstrap
    description: "Wenn AN, prüft der Start Telegram-Abhängigkeiten und installiert fehlende python-telegram-bot Pakete automatisch, wenn möglich."
  tool_browser_enabled:
    name: Browser-Tool-Bootstrap
    description: "Wenn AN, prüft der Start Browser-Abhängigkeiten und installiert fehlende externe Tools (z.B. agent-browser), wenn möglich."
  tool_skills_hub_enabled:
    name: Skills-Hub-Bootstrap
    description: "Wenn AN, initialisiert der Start das Skills-Hub-Verzeichnis automatisch (entspricht `hermes skills list` beim ersten Start)."
  openai_api_key:
    name: OpenAI API-Schlüssel
    description: "Optionales Token, synchronisiert nach /config/.hermes/.env als OPENAI_API_KEY für Hermes onboard/model setup und Laufzeit."
  openrouter_api_key:
    name: OpenRouter API-Schlüssel
    description: "Optionales Token, synchronisiert nach /config/.hermes/.env als OPENROUTER_API_KEY für Hermes onboard/model setup und Laufzeit."
  anthropic_api_key:
    name: Anthropic API-Schlüssel
    description: "Optionales Token, synchronisiert nach /config/.hermes/.env als ANTHROPIC_API_KEY für Hermes onboard/model setup und Laufzeit."
  google_api_key:
    name: Google API-Schlüssel
    description: "Optionales Token, synchronisiert nach /config/.hermes/.env als GOOGLE_API_KEY für Hermes onboard/model setup und Laufzeit."
  minimax_api_key:
    name: MiniMax API-Schlüssel
    description: "Optionales Token, synchronisiert nach /config/.hermes/.env als MINIMAX_API_KEY für Hermes onboard/model setup und Laufzeit."
  discord_bot_token:
    name: Discord Bot Token
    description: "Optionales Token, synchronisiert nach /config/.hermes/.env als DISCORD_BOT_TOKEN für Discord-Tools."
  github_token:
    name: GitHub Token
    description: "Optionales Token, synchronisiert nach /config/.hermes/.env als GITHUB_TOKEN für bessere API-Limits."
  xai_api_key:
    name: xAI API-Schlüssel
    description: "Optionales Token, synchronisiert nach /config/.hermes/.env als XAI_API_KEY für x_search."
