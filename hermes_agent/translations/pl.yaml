configuration:
  timezone:
    name: Strefa czasowa
    description: Strefa czasowa dla dodatku (np. Europe/Warsaw, America/New_York)
  
  enable_terminal:
    name: Włącz terminal webowy
    description: Włącz przycisk terminala webowego w Home Assistant (Ingress) przez ttyd
  
  terminal_port:
    name: Port terminala
    description: Numer portu dla terminala webowego (domyślnie - 7681). Zmień jeśli ten port koliduje z inną usługą.
  
  gateway_public_url:
    name: Publiczny URL Gateway
    description: Publiczny bazowy URL do otwierania Web UI Gateway w nowej karcie (nie osadzone). Przykład - https://example.duckdns.org:12345 lub http://192.168.1.10:18789
  
  hass_url:
    name: URL Home Assistant
    description: "Bazowy URL Home Assistant dla skryptów/narzędzi. Pozostaw puste dla autowykrywania na HAOS (zalecane). Synchronizowany jako HOMEASSISTANT_URL w /config/.hermes/.env, gdy ustawiony jest token."

  homeassistant_token:
    name: Token Home Assistant
    description: Długoterminowy token dostępu dla MCP i skryptów HA. Ukryty po zapisaniu. Synchronizowany do /config/secrets/homeassistant.token i /config/.hermes/.env po restarcie.

  setup_profile:
    name: Profil konfiguracji
    description: "Preset pierwszego uruchomienia. home_assistant włącza LAN HTTPS, auto MCP przy tokenie i bootstrap model/browser/timezone. general używa dostępu tylko lokalnego. advanced używa wyłącznie opcji indywidualnych."
    options:
      home_assistant: "Home Assistant (zalecane)"
      general: "Asystent ogólny"
      advanced: "Zaawansowane (opcje ręczne)"

  default_model_preset:
    name: Preset modelu
    description: "Kuratowany model główny dla pierwszego uruchomienia. auto wnioskuje z pierwszego klucza API; custom używa pola Model (custom)."
    options:
      auto: "Auto (z klucza API)"
      gemini_flash: "Gemini 2.5 Flash (OpenRouter)"
      claude_sonnet: "Claude Sonnet 4 (OpenRouter)"
      gpt_mini: "GPT-4.1 Mini (OpenRouter)"
      custom: "Własny ID modelu"

  default_model:
    name: Model (custom)
    description: "ID modelu gdy preset to custom. Bootstrap tylko przy pierwszym uruchomieniu, gdy model nie jest skonfigurowany."

  firecrawl_api_key:
    name: Klucz API Firecrawl
    description: "Opcjonalny token wyszukiwania web, synchronizowany jako FIRECRAWL_API_KEY w /config/.hermes/.env."

  searxng_url:
    name: URL SearXNG
    description: "Opcjonalny URL SearXNG synchronizowany jako SEARXNG_URL w /config/.hermes/.env."

  http_proxy:
    name: Wychodzący proxy HTTP
    description: Opcjonalnie - URL proxy dla wychodzących żądań HTTP/HTTPS (przykład - http://192.168.2.1:3128)
  
  router_ssh_host:
    name: Host SSH routera
    description: Opcjonalnie - nazwa hosta SSH routera/firewalla lub adres IP
  
  router_ssh_user:
    name: Użytkownik SSH routera
    description: Opcjonalnie - nazwa użytkownika SSH routera/firewalla
  
  router_ssh_key_path:
    name: Ścieżka klucza SSH routera
    description: Ścieżka do klucza prywatnego SSH dla dostępu do routera (domyślnie - /data/keys/router_ssh)
  
  clean_session_locks_on_start:
    name: Wyczyść blokady sesji przy starcie
    description: Usuń przestarzałe pliki blokad sesji pozostawione po awariach/restartach gdy dodatek się uruchamia
  
  clean_session_locks_on_exit:
    name: Wyczyść blokady sesji przy wyjściu
    description: Usuń pliki blokad sesji gdy dodatek zatrzymuje się poprawnie
  
  gateway_remote_url:
    name: URL zdalnego Gateway
    description: Adres WebSocket zdalnego gateway używany gdy Gateway Mode = Remote (przykład - ws://192.168.1.20:18789 lub wss://gateway.example.com:443)

  gateway_additional_allowed_origins:
    name: Dodatkowe dozwolone origins
    description: Dodatkowe origins Control UI rozdzielone przecinkami; łączone z gateway.controlUi.allowedOrigins w trybie lan_https (przykład - https://ha.example.com:8443,capacitor://localhost)

  controlui_disable_device_auth:
    name: Wyłącz parowanie urządzeń Control UI (lan_https)
    description: "Gdy WŁĄCZONE (zalecane), ustawia gateway.controlUi.dangerouslyDisableDeviceAuth=true, pomija akceptację per-urządzenie i zapobiega błędowi 1008 w trybie LAN HTTPS. Zostaw WŁĄCZONE w domowej/zaufanej sieci. Wyłącz tylko jeśli chcesz ścisłe parowanie dla każdej nowej przeglądarki/urządzenia."

  gateway_bind_mode:
    name: Tryb bindowania Gateway
    description: Tryb bindowania sieci - loopback (tylko 127.0.0.1, najbezpieczniejszy), lan (wszystkie interfejsy) lub tailnet (tylko interfejs Tailscale). Nadpisywane przez ustawienia trybu dostępu.
    options:
      loopback: "Loopback (tylko 127.0.0.1, najbezpieczniejszy)"
      lan: "LAN (wszystkie interfejsy)"
      tailnet: "Tailnet (tylko Tailscale)"

  gateway_port:
    name: Port Gateway
    description: Numer portu na którym gateway Hermes Agent będzie nasłuchiwał (domyślnie - 18789)

  gateway_mode:
    name: Tryb Gateway
    description: Tryb działania gateway - local (uruchom gateway lokalnie, zalecane) lub remote (połącz się ze zdalnym gateway)
    options:
      local: "Lokalny (zalecane)"
      remote: "Zdalny"

  access_mode:
    name: Tryb dostępu
    description: "Upraszcza konfigurację bezpiecznego dostępu. Nadpisuje gateway_bind_mode i gateway_auth_mode gdy nie jest ustawiony na Niestandardowy."
    options:
      custom: "Niestandardowy (indywidualne ustawienia)"
      local_only: "Tylko lokalny (loopback + token, tylko Ingress)"
      lan_https: "LAN HTTPS (wbudowany proxy HTTPS — zalecane dla telefonów)"
      lan_reverse_proxy: "LAN Reverse Proxy (zewnętrzny proxy z auth trusted-proxy)"
      tailnet_https: "Tailscale HTTPS (Tailscale + token)"

  gateway_auth_mode:
    name: Tryb uwierzytelniania Gateway
    description: Tryb uwierzytelniania - token (domyślnie) lub trusted-proxy (dla reverse proxy HTTPS). Nadpisywane gdy access_mode nie jest Niestandardowy.
    options:
      token: "Token (domyślnie)"
      trusted-proxy: "Zaufany proxy (dla reverse proxy)"

  gateway_trusted_proxies:
    name: Zaufane proxy Gateway
    description: Lista zaufanych IP/CIDR proxy rozdzielona przecinkami dla trybu trusted-proxy (przykład - 127.0.0.1,192.168.88.0/24).

  enable_openai_api:
    name: Włącz API OpenAI
    description: Włącz endpoint Chat Completions kompatybilny z OpenAI. Pozwala używać Hermes Agent jako agenta konwersacji w HA Assist pipeline przez Extended OpenAI Conversation (HACS) lub dowolnego klienta kompatybilnego z OpenAI.
  enable_ha_status_sensors:
    name: Włącz sensory statusu HA
    description: "Publikuje konfigurację, stan gateway, model/dostawcę i metryki użycia do Home Assistant przez MQTT discovery (gdy Mosquitto jest zainstalowany) oraz bezpieczny snapshot /status.json przez Ingress."
  publish_mqtt_discovery:
    name: Publikuj MQTT discovery
    description: "Gdy WŁĄCZONE i Mosquitto działa, automatycznie tworzy encje HA dla statusu Hermes. Wyłącz, jeśli potrzebujesz tylko API /status.json."
  status_poll_interval_seconds:
    name: Interwał odświeżania statusu (sekundy)
    description: "Jak często odświeżać sensory i /share/hermes/status.json. Zakres 30-300. Wyższe wartości zmniejszają zapisy na flash na kartach SD."
  mqtt_state_prefix:
    name: Prefiks tematów MQTT
    description: "Prefiks tematów stanu MQTT (domyślnie hermes). Przykład: <prefix>/status/gateway_running."
  force_ipv4_dns:
    name: Wymuś kolejność DNS IPv4
    description: Wymusza priorytet IPv4 w DNS. Większość VM HAOS nie ma wyjścia IPv6 — powoduje błędy web_fetch i Telegram. Zalecane WŁĄCZONE (domyślnie).
  nginx_log_level:
    name: Poziom logów Nginx
    description: "Szczegółowość logów dostępu nginx. 'minimal' (domyślnie) pomija powtarzające się żądania health-check i polling HA. 'full' loguje wszystko."
    options:
      minimal: "Minimalny (pominięcie szumu polling HA)"
      full: "Pełny (logowanie wszystkich żądań)"
  gateway_env_vars:
    name: Zmienne środowiskowe gateway
    description: Zmienne środowiskowe przekazywane do procesu gateway Hermes Agent podczas uruchamiania (lista wpisow name/value w UI Home Assistant; maks. 50 zmiennych, klucze do 255 znakow, wartosci do 10000 znakow).
  auto_configure_mcp:
    name: Automatyczna konfiguracja MCP dla Home Assistant
    description: "Gdy WŁĄCZONE i token Home Assistant jest ustawiony, automatycznie rejestruje Home Assistant w wbudowanym MCP Hermes (mcp_servers) przy każdym starcie. Pozwala to Hermes Agent kontrolować urządzenia HA, usługi i automatyzacje przez Model Context Protocol. Wyłącz tylko jeśli zarządzasz konfiguracją MCP Hermes ręcznie."
  hermes_agent_version_preset:
    name: Wersja Hermes Agent
    description: "Wersja pakietu npm instalowana przy starcie (dostarcza CLI `hermes`). Przypięta wersja dla stabilności; latest śledzi najnowsze wydanie."
    options:
      latest: "Latest (npm @latest)"
      0.15.2: "0.15.2 (przypięta)"
      0.15.1: "0.15.1 (przypięta)"
      0.14.0: "0.14.0 (przypięta)"
      custom: "Wersja niestandardowa"

  hermes_agent_version_custom:
    name: Wersja Hermes Agent (niestandardowa)
    description: "Tag npm lub semver, gdy Wersja Hermes Agent to niestandardowa (np. 0.15.2). Stosowane przy następnym restarcie add-onu."

  tool_telegram_enabled:
    name: Bootstrap narzędzia Telegram
    description: "Gdy WŁĄCZONE, start sprawdza zależności Telegram i automatycznie instaluje brakujące pakiety python-telegram-bot, jeśli to możliwe."
  tool_browser_enabled:
    name: Bootstrap narzędzia Browser
    description: "Gdy WŁĄCZONE, start sprawdza zależności przeglądarki i automatycznie instaluje brakujące narzędzia zewnętrzne (np. agent-browser), jeśli to możliwe."
  tool_skills_hub_enabled:
    name: Bootstrap Skills Hub
    description: "Gdy WŁĄCZONE, start automatycznie inicjalizuje katalog Skills Hub (odpowiednik pierwszego `hermes skills list`)."
  openai_api_key:
    name: Klucz API OpenAI
    description: "Opcjonalny token synchronizowany do /config/.hermes/.env jako OPENAI_API_KEY dla konfiguracji onboard/model i runtime Hermes."
  openrouter_api_key:
    name: Klucz API OpenRouter
    description: "Opcjonalny token synchronizowany do /config/.hermes/.env jako OPENROUTER_API_KEY dla konfiguracji onboard/model i runtime Hermes."
  anthropic_api_key:
    name: Klucz API Anthropic
    description: "Opcjonalny token synchronizowany do /config/.hermes/.env jako ANTHROPIC_API_KEY dla konfiguracji onboard/model i runtime Hermes."
  google_api_key:
    name: Klucz API Google
    description: "Opcjonalny token synchronizowany do /config/.hermes/.env jako GOOGLE_API_KEY dla konfiguracji onboard/model i runtime Hermes."
  minimax_api_key:
    name: Klucz API MiniMax
    description: "Opcjonalny token synchronizowany do /config/.hermes/.env jako MINIMAX_API_KEY dla konfiguracji onboard/model i runtime Hermes."
  discord_bot_token:
    name: Token bota Discord
    description: "Opcjonalny token synchronizowany do /config/.hermes/.env jako DISCORD_BOT_TOKEN dla narzędzi Discord."
  github_token:
    name: Token GitHub
    description: "Opcjonalny token synchronizowany do /config/.hermes/.env jako GITHUB_TOKEN dla lepszych limitów API."
  xai_api_key:
    name: Klucz API xAI
    description: "Opcjonalny token synchronizowany do /config/.hermes/.env jako XAI_API_KEY dla x_search."
