configuration:
  timezone:
    name: Strefa czasowa
    description: Strefa czasowa dla dodatku (np. Europe/Warsaw, America/New_York)

  addon_log_level:
    name: Poziom logów dodatku
    description: Szczegółowość logów startowych kontenera dodatku (kolory i emoji, gdy terminal logów jest interaktywny).
    options:
      error: "Tylko błędy"
      warn: "Ostrzeżenia i błędy"
      info: "Info (domyślnie)"
      debug: "Debug (szczegółowy)"

  setup_profile:
    name: Profil konfiguracji
    description: "Preset pierwszego uruchomienia. home_assistant włącza LAN HTTPS, auto MCP przy tokenie i bootstrap model/browser/timezone. general używa dostępu tylko lokalnego. advanced używa wyłącznie opcji indywidualnych."
    options:
      home_assistant: "Home Assistant (zalecane)"
      general: "Asystent ogólny"
      advanced: "Zaawansowane (opcje ręczne)"

  default_provider:
    name: Domyślny dostawca
    description: "Główny dostawca LLM dla pierwszego uruchomienia. Nous Portal używa OAuth (`hermes setup --portal` lub `hermes auth add nous` w terminalu). Ollama odpowiada Ollama Cloud (`ollama-cloud`)."
    options:
      nous: "Nous Portal"
      openrouter: "OpenRouter"
      google: "Google (klucz API Gemini)"
      anthropic: "Anthropic"
      ollama: "Ollama Cloud"
      minimax: "MiniMax"
      xai: "xAI (Grok)"
      openai: "OpenAI"

  default_model_preset:
    name: Preset modelu
    description: "Wybierz Custom i ustaw ID modelu w polu Domyślny model."
    options:
      custom: "Własny ID modelu"

  default_model:
    name: Domyślny model
    description: "ID modelu dla wybranego dostawcy (np. google/gemini-2.5-flash dla OpenRouter, claude-sonnet-4-6 dla Anthropic, gpt-oss:120b dla Ollama Cloud). Bootstrap tylko przy pierwszym uruchomieniu, gdy model nie jest skonfigurowany."

  provider_api_keys:
    name: Klucze API dostawców
    description: Opcjonalne tokeny dostawców i narzędzi synchronizowane do /config/.hermes/.env przy restarcie. Dostawcy OAuth/device-code nadal wymagają `hermes auth` w terminalu.
    fields:
      openai_api_key:
        name: Klucz API OpenAI
        description: Synchronizowany jako OPENAI_API_KEY.
      openrouter_api_key:
        name: Klucz API OpenRouter
        description: Synchronizowany jako OPENROUTER_API_KEY.
      anthropic_api_key:
        name: Klucz API Anthropic
        description: Synchronizowany jako ANTHROPIC_API_KEY.
      google_api_key:
        name: Klucz API Google
        description: Synchronizowany jako GOOGLE_API_KEY.
      ollama_api_key:
        name: Klucz API Ollama Cloud
        description: Synchronizowany jako OLLAMA_API_KEY (z ollama.com/settings/keys).
      minimax_api_key:
        name: Klucz API MiniMax
        description: Synchronizowany jako MINIMAX_API_KEY.
      discord_bot_token:
        name: Token bota Discord
        description: Synchronizowany jako DISCORD_BOT_TOKEN.
      github_token:
        name: Token GitHub
        description: Synchronizowany jako GITHUB_TOKEN.
      xai_api_key:
        name: Klucz API xAI
        description: Synchronizowany jako XAI_API_KEY.
      firecrawl_api_key:
        name: Klucz API Firecrawl
        description: Synchronizowany jako FIRECRAWL_API_KEY.
      searxng_url:
        name: URL SearXNG
        description: Synchronizowany jako SEARXNG_URL.

  home_assistant:
    name: Integracja z Home Assistant
    description: Łączy Hermes z Home Assistant. Każde pole ma test w interfejsie web (Testy połączenia).
    fields:
      hass_url:
        name: URL Home Assistant
        description: "Pozostaw puste dla autowykrywania. Testy połączenia → Test URL."
      homeassistant_token:
        name: Token Home Assistant
        description: Długoterminowy token dostępu dla MCP i skryptów HA. Ukryty po zapisaniu. Zapisany w /config/secrets/homeassistant.token.
      auto_configure_mcp:
        name: Automatyczna konfiguracja MCP dla Home Assistant
        description: "Rejestruje HA w MCP przy starcie. Po restarcie: Testy połączenia → Test MCP."

  enable_terminal:
    name: Włącz terminal webowy
    description: Włącz przycisk terminala webowego w Home Assistant (Ingress) przez ttyd

  terminal_port:
    name: Port terminala
    description: Port dla terminala webowego (domyślnie 7681). Zmień, jeśli ten port koliduje z inną usługą.

  web_interface:
    name: Hermes Web UI
    description: Panel Hermes (hermes dashboard). HTTPS na zewnątrz na gateway_port. Każde pole ma test w Testy połączenia.
    fields:
      enable_web_interface:
        name: Włącz Hermes Web UI
        description: Uruchamia hermes dashboard. Testy połączenia → Test Dashboard.
      auto_start_with_integration:
        name: Auto-start z dodatkiem
        description: Uruchamia hermes dashboard przy starcie dodatku. Wymagane dla Test Dashboard.
      dashboard_port:
        name: Port loopback panelu
        description: Tylko offset loopback (proces na dashboard_port + 1). HTTPS na LAN tylko na gateway_port.

  gateway_access:
    name: Dostęp do Gateway
    description: Dostęp sieciowy i API Assist. Każde istotne pole ma test w Testy połączenia.
    fields:
      access_mode:
        name: Tryb dostępu
        description: "Upraszcza konfigurację bezpiecznego dostępu. Nadpisuje bind/auth gdy nie jest Niestandardowy."
        options:
          custom: "Niestandardowy (indywidualne ustawienia)"
          local_only: "Tylko lokalny (loopback + token, tylko Ingress)"
          lan_https: "LAN HTTPS (wbudowany proxy HTTPS — zalecane dla telefonów)"
          lan_reverse_proxy: "LAN Reverse Proxy (zewnętrzny proxy z auth trusted-proxy)"
          tailnet_https: "Tailscale HTTPS (Tailscale + token)"
      gateway_port:
        name: Port Gateway
        description: Port HTTPS Hermes Web UI (domyślnie 18789). Testy połączenia → Test Web UI HTTPS.
      gateway_public_url:
        name: Publiczny URL Gateway
        description: Publiczny URL do otwierania Hermes Web UI w nowej karcie (nie osadzone).
      enable_openai_api:
        name: Włącz API OpenAI
        description: "Włącza API Assist Hermes (API_SERVER_ENABLED). Extended OpenAI z HA Core: http://<LAN-IP>:8642/v1."
      gateway_mode:
        name: Tryb Gateway
        description: Lokalny (gateway w dodatku) lub zdalny (połączenie z zewnętrznym gateway).
        options:
          local: "Lokalny (zalecane)"
          remote: "Zdalny"
      gateway_remote_url:
        name: URL zdalnego Gateway
        description: Adres WebSocket gdy Tryb Gateway to Zdalny.
      gateway_bind_mode:
        name: Tryb bindowania Gateway
        description: Bindowanie loopback, LAN lub Tailscale. Nadpisywane przez ustawienia trybu dostępu.
        options:
          loopback: "Loopback (tylko 127.0.0.1, najbezpieczniejszy)"
          lan: "LAN (wszystkie interfejsy)"
          tailnet: "Tailnet (tylko Tailscale)"
      gateway_auth_mode:
        name: Tryb uwierzytelniania Gateway
        description: Token (domyślnie) lub trusted-proxy dla reverse proxy.
        options:
          token: "Token (domyślnie)"
          trusted-proxy: "Zaufany proxy (dla reverse proxy)"
      gateway_trusted_proxies:
        name: Zaufane proxy Gateway
        description: "Lista IP/CIDR zaufanych reverse proxy dla gateway_auth_mode trusted-proxy (jeden wiersz na proxy). Wymagane przy access_mode lan_reverse_proxy lub zewnętrznym proxy (NPM, Caddy, Traefik). Gdy puste w lan_reverse_proxy, start ustawia domyślne (127.0.0.1, 172.30.0.0/16, 10.0.0.0/8). Proxy musi wysyłać X-Forwarded-User."
        fields:
          value:
            name: IP lub CIDR proxy
            description: "IPv4, IPv4/CIDR lub IPv6/CIDR źródła proxy. Przykłady: 127.0.0.1, 192.168.88.0/24, 172.30.0.0/16."
      gateway_additional_allowed_origins:
        name: Dodatkowe dozwolone origins
        description: "Dodatkowe origins przeglądarki dla Control UI Hermes (jeden wiersz na origin). Scalane z domyślnymi do gateway.controlUi.allowedOrigins. W lan_https hostnames trafiają też do SAN certyfikatu TLS."
        fields:
          value:
            name: URL origin
            description: "Pełny origin ze schematem i hostem (port gdy niestandardowy). Przykłady: https://ha.example.com:8443, https://homeassistant.local:8123, capacitor://localhost."
      controlui_disable_device_auth:
        name: Wyłącz parowanie urządzeń Control UI (lan_https)
        description: "Zalecane WŁĄCZONE dla domowej sieci LAN — pomija akceptację per-urządzenie (zapobiega błędowi 1008)."

  mqtt_settings:
    name: Sensory statusu MQTT
    description: Połączenie z brokerem MQTT. Każde pole brokera ma test w Testy połączenia.
    fields:
      broker_host:
        name: Host brokera MQTT
        description: "IP lub nazwa hosta brokera. Pozostaw puste dla autowykrywania Mosquitto (supervisor/bashio/loopback)."
      broker_port:
        name: Port brokera MQTT
        description: Port brokera MQTT (domyślnie 1883).
      broker_username:
        name: Nazwa użytkownika MQTT
        description: Opcjonalna nazwa użytkownika Mosquitto (pozostaw puste gdy auth jest wyłączone).
      broker_password:
        name: Hasło MQTT
        description: Opcjonalne hasło Mosquitto. Ukryte po zapisaniu. Zapisane w /config/secrets/mqtt.password.
      enable_ha_status_sensors:
        name: Włącz sensory statusu HA
        description: Publikuje konfigurację, stan gateway, model/dostawcę i metryki użycia do Home Assistant.
      publish_mqtt_discovery:
        name: Publikuj MQTT discovery
        description: Twórz encje HA raz na wersję dodatku (znacznik /config/.hermes/.mqtt_discovery_published). Wyłącz, aby używać tylko /status.json.
      status_poll_interval_seconds:
        name: Interwał odświeżania statusu (sekundy)
        description: Interwał odświeżania dla sensorów i /share/hermes/status.json (30-300).
      state_prefix:
        name: Prefiks tematów MQTT
        description: "Prefiks tematów stanu (domyślnie hermes). Przykład: hermes/status/gateway_running."

  router_ssh:
    name: SSH routera
    description: Opcjonalny dostęp SSH do routera lub urządzenia sieciowego dostępnego z LAN hosta HA.
    fields:
      host:
        name: Host SSH routera
        description: Nazwa hosta SSH lub adres IP routera/firewalla.
      user:
        name: Użytkownik SSH routera
        description: Nazwa użytkownika SSH dla dostępu do routera.
      key_path:
        name: Ścieżka klucza SSH routera
        description: Ścieżka do klucza prywatnego na trwałym magazynie (domyślnie /config/keys/router_ssh).

  tools_bootstrap:
    name: Bootstrap narzędzi
    description: Weryfikuj i automatycznie instaluj opcjonalne zależności narzędzi Hermes przy starcie.
    fields:
      tool_telegram_enabled:
        name: Włącz bootstrap narzędzia Telegram
        description: Automatycznie instaluj zależności Python Telegram gdy brakuje.
      tool_browser_enabled:
        name: Włącz bootstrap narzędzia Browser
        description: Automatycznie instaluj zależności przeglądarki (np. agent-browser) gdy brakuje.
      tool_skills_hub_enabled:
        name: Włącz bootstrap Skills Hub
        description: Inicjalizuj katalog Skills Hub przy starcie (jak `hermes skills list` przy pierwszym uruchomieniu).

  advanced_settings:
    name: Ustawienia zaawansowane
    description: Proxy, DNS, logi nginx, zmienne środowiskowe gateway, wersja Hermes i czyszczenie blokad sesji.
    fields:
      http_proxy:
        name: Wychodzący proxy HTTP
        description: Opcjonalny URL proxy dla wychodzącego HTTP/HTTPS (przykład http://192.168.2.1:3128).
      force_ipv4_dns:
        name: Wymuś kolejność DNS IPv4
        description: Zalecane WŁĄCZONE na HAOS — unika timeoutów wyjścia IPv6 dla web_fetch i Telegram.
      nginx_log_level:
        name: Poziom logów Nginx
        description: Szczegółowość logów dostępu wbudowanego proxy HTTPS.
        options:
          minimal: "Minimalny (pominięcie szumu polling HA)"
          full: "Pełny (logowanie wszystkich żądań)"
      gateway_env_vars:
        name: Zmienne środowiskowe gateway
        description: Dodatkowe zmienne środowiskowe przekazywane do procesu gateway (maks. 50 wpisów).
      hermes_agent_version_preset:
        name: Wersja Hermes Agent
        description: Pakiet npm dla CLI `hermes` — latest lub własna wersja.
        options:
          latest: "Latest (npm @latest)"
          custom: "Wersja niestandardowa (domyślnie 0.17.0)"
      hermes_agent_version_custom:
        name: Wersja Hermes Agent (niestandardowa)
        description: dist-tag npm lub semver gdy preset to niestandardowy (domyślnie 0.17.0).
      clean_session_locks_on_start:
        name: Wyczyść blokady sesji przy starcie
        description: Usuń przestarzałe pliki blokad sesji gdy dodatek się uruchamia.
      clean_session_locks_on_exit:
        name: Wyczyść blokady sesji przy wyjściu
        description: Usuń pliki blokad sesji przy prawidłowym zamknięciu.
