configuration:
  timezone:
    name: Fuso Horário
    description: Fuso horário do add-on (ex., America/Sao_Paulo, America/Fortaleza)

  addon_log_level:
    name: Nível de log do add-on
    description: Verbosidade dos logs de inicialização do contêiner do add-on (cores e emojis quando o terminal de log é interativo).
    options:
      error: "Somente erros"
      warn: "Avisos e erros"
      info: "Info (padrão)"
      debug: "Debug (detalhado)"

  setup_profile:
    name: Perfil de configuração
    description: "Preset de primeira execução. home_assistant habilita LAN HTTPS, MCP automático com token e bootstrap de model/browser/timezone. general usa acesso apenas local. advanced usa somente opções individuais."
    options:
      home_assistant: "Home Assistant (recomendado)"
      general: "Assistente geral"
      advanced: "Avançado (opções manuais)"

  default_model_preset:
    name: Predefinição de modelo
    description: "Modelo principal curado para a primeira execução. auto infere da primeira chave API; custom usa o campo Modelo (custom)."
    options:
      auto: "Auto (da chave API)"
      gemini_flash: "Gemini 2.5 Flash (OpenRouter)"
      claude_sonnet: "Claude Sonnet 4 (OpenRouter)"
      gpt_mini: "GPT-4.1 Mini (OpenRouter)"
      custom: "ID de modelo personalizado"

  default_model:
    name: Modelo (custom)
    description: "ID do modelo quando a predefinição é custom. Bootstrap apenas na primeira execução quando nenhum modelo estiver configurado."

  provider_api_keys:
    name: Chaves API de provedores
    description: Tokens opcionais de provedores e ferramentas sincronizados em /config/.hermes/.env ao reiniciar. Provedores OAuth/device-code ainda exigem `hermes auth` no terminal.
    fields:
      openai_api_key:
        name: Chave API OpenAI
        description: Sincronizada como OPENAI_API_KEY.
      openrouter_api_key:
        name: Chave API OpenRouter
        description: Sincronizada como OPENROUTER_API_KEY.
      anthropic_api_key:
        name: Chave API Anthropic
        description: Sincronizada como ANTHROPIC_API_KEY.
      google_api_key:
        name: Chave API Google
        description: Sincronizada como GOOGLE_API_KEY.
      minimax_api_key:
        name: Chave API MiniMax
        description: Sincronizada como MINIMAX_API_KEY.
      discord_bot_token:
        name: Token de bot do Discord
        description: Sincronizado como DISCORD_BOT_TOKEN.
      github_token:
        name: Token do GitHub
        description: Sincronizado como GITHUB_TOKEN.
      xai_api_key:
        name: Chave API xAI
        description: Sincronizada como XAI_API_KEY.
      firecrawl_api_key:
        name: Chave API Firecrawl
        description: Sincronizada como FIRECRAWL_API_KEY.
      searxng_url:
        name: URL SearXNG
        description: Sincronizada como SEARXNG_URL.

  home_assistant:
    name: Integração com Home Assistant
    description: Conecta o Hermes à sua instância do Home Assistant para MCP, scripts e autodetecção.
    fields:
      hass_url:
        name: URL do Home Assistant
        description: "Deixe vazio para autodetecção no HAOS (recomendado). Sincronizada como HOMEASSISTANT_URL em /config/.hermes/.env quando o token estiver definido."
      homeassistant_token:
        name: Token do Home Assistant
        description: Token de longa duração para MCP e scripts do HA. Mascarado após salvar. Persistido em /config/secrets/homeassistant.token.
      auto_configure_mcp:
        name: Configurar MCP automaticamente para o Home Assistant
        description: "Quando LIGADO e o token estiver definido, registra o Home Assistant no MCP do Hermes (mcp_servers) a cada inicialização."

  enable_terminal:
    name: Habilitar Terminal Web
    description: Habilitar botão do terminal web dentro do Home Assistant (Ingress) via ttyd

  terminal_port:
    name: Porta do Terminal
    description: Porta para o terminal web (padrão 7681). Altere se esta porta conflitar com outro serviço.

  gateway_access:
    name: Acesso ao Gateway
    description: Acesso de rede, autenticação e configurações da API Assist para o gateway Hermes.
    fields:
      access_mode:
        name: Modo de Acesso
        description: "Simplifica a configuração de acesso seguro. Substitui bind/auth quando não é Personalizado."
        options:
          custom: "Personalizado (configurações individuais)"
          local_only: "Apenas local (loopback + token, apenas Ingress)"
          lan_https: "LAN HTTPS (proxy HTTPS integrado — recomendado para celulares)"
          lan_reverse_proxy: "LAN Reverse Proxy (proxy externo com auth trusted-proxy)"
          tailnet_https: "Tailscale HTTPS (Tailscale + token)"
      gateway_port:
        name: Porta do Gateway
        description: Porta do gateway Hermes (padrão 18789).
      gateway_public_url:
        name: URL Pública do Gateway
        description: URL base pública para abrir a interface web do Gateway em uma nova aba (não incorporada).
      enable_openai_api:
        name: Habilitar API OpenAI
        description: "Ativa a API Assist do Hermes (API_SERVER_ENABLED). Extended OpenAI do HA Core: http://<LAN-IP>:8642/v1."
      gateway_mode:
        name: Modo do Gateway
        description: Local (gateway no add-on) ou remoto (conexão a gateway externo).
        options:
          local: "Local (recomendado)"
          remote: "Remoto"
      gateway_remote_url:
        name: URL do Gateway Remoto
        description: URL WebSocket quando o Modo do Gateway é Remoto.
      gateway_bind_mode:
        name: Modo de Vinculação do Gateway
        description: Vinculação loopback, LAN ou Tailscale. Substituído pelas predefinições do modo de acesso.
        options:
          loopback: "Loopback (somente 127.0.0.1, mais seguro)"
          lan: "LAN (todas as interfaces)"
          tailnet: "Tailnet (somente Tailscale)"
      gateway_auth_mode:
        name: Modo de Autenticação do Gateway
        description: Token (padrão) ou trusted-proxy para reverse proxies.
        options:
          token: "Token (padrão)"
          trusted-proxy: "Proxy Confiável (para reverse proxies)"
      gateway_trusted_proxies:
        name: Proxies Confiáveis do Gateway
        description: Entradas de IP ou CIDR de proxy confiável (uma por linha) para o modo trusted-proxy.
      gateway_additional_allowed_origins:
        name: Origens permitidas adicionais
        description: Origens extras da Control UI (uma por linha); mescladas em allowedOrigins e TLS SAN em lan_https.
      controlui_disable_device_auth:
        name: Desativar pareamento por dispositivo no Control UI (lan_https)
        description: "Recomendado LIGADO para LAN doméstica — pula aprovação por dispositivo (evita erro 1008)."

  mqtt_settings:
    name: Sensores de status MQTT
    description: Conexão com o broker e publicação de sensores de status do Home Assistant (MQTT discovery + /status.json).
    fields:
      broker_host:
        name: Host do broker MQTT
        description: "IP ou nome do host do broker. Deixe vazio para autodetectar Mosquitto (supervisor/bashio/loopback)."
      broker_port:
        name: Porta do broker MQTT
        description: Porta do broker MQTT (padrão 1883).
      broker_username:
        name: Usuário MQTT
        description: Usuário Mosquitto opcional (deixe vazio quando a autenticação estiver desativada).
      broker_password:
        name: Senha MQTT
        description: Senha Mosquitto opcional. Mascarada após salvar. Persistida em /config/secrets/mqtt.password.
      enable_ha_status_sensors:
        name: Habilitar sensores de status HA
        description: Publica configuração, saúde do gateway, modelo/provedor e métricas de uso no Home Assistant.
      publish_mqtt_discovery:
        name: Publicar MQTT discovery
        description: Criar entidades HA automaticamente quando Mosquitto estiver disponível. Desative para usar apenas /status.json.
      status_poll_interval_seconds:
        name: Intervalo de status (segundos)
        description: Intervalo de atualização para sensores e /share/hermes/status.json (30-300).
      state_prefix:
        name: Prefixo de tópicos MQTT
        description: "Prefixo para tópicos de estado (padrão hermes). Exemplo: hermes/status/gateway_running."

  router_ssh:
    name: SSH do roteador
    description: Acesso SSH opcional a um roteador ou dispositivo de rede acessível na LAN do host HA.
    fields:
      host:
        name: Host SSH do Roteador
        description: Nome do host ou endereço IP do roteador/firewall.
      user:
        name: Usuário SSH do Roteador
        description: Nome de usuário SSH para acesso ao roteador.
      key_path:
        name: Caminho da Chave SSH do Roteador
        description: Caminho para a chave privada em armazenamento persistente (padrão /config/keys/router_ssh).

  tools_bootstrap:
    name: Bootstrap de ferramentas
    description: Verificar e instalar automaticamente dependências opcionais de ferramentas Hermes na inicialização.
    fields:
      tool_telegram_enabled:
        name: Habilitar bootstrap da ferramenta Telegram
        description: Instalar automaticamente dependências Python do Telegram quando ausentes.
      tool_browser_enabled:
        name: Habilitar bootstrap da ferramenta Browser
        description: Instalar automaticamente dependências de browser (ex. agent-browser) quando ausentes.
      tool_skills_hub_enabled:
        name: Habilitar bootstrap do Skills Hub
        description: Inicializar o diretório do Skills Hub na inicialização (como `hermes skills list` na primeira execução).

  advanced_settings:
    name: Configurações avançadas
    description: Proxy, DNS, logs do nginx, variáveis de ambiente do gateway, versão do Hermes e limpeza de bloqueios de sessão.
    fields:
      http_proxy:
        name: Proxy HTTP de saída
        description: URL de proxy opcional para HTTP/HTTPS de saída (exemplo http://192.168.2.1:3128).
      force_ipv4_dns:
        name: Forçar ordem DNS IPv4
        description: Recomendado LIGADO no HAOS — evita timeouts de saída IPv6 para web_fetch e Telegram.
      nginx_log_level:
        name: Nível de log Nginx
        description: Verbosidade do log de acesso do proxy HTTPS integrado.
        options:
          minimal: "Mínimo (suprimir ruído de polling HA)"
          full: "Completo (registrar todas as requisições)"
      gateway_env_vars:
        name: Variáveis de Ambiente do Gateway
        description: Variáveis de ambiente adicionais passadas ao processo do gateway (máx. 50 entradas).
      hermes_agent_version_preset:
        name: Versão do Hermes Agent
        description: Pacote npm para a CLI `hermes` — latest ou versão personalizada.
        options:
          latest: "Latest (npm @latest)"
          custom: "Versão personalizada (padrão 0.16.0)"
      hermes_agent_version_custom:
        name: Versão do Hermes Agent (personalizada)
        description: dist-tag npm ou semver quando a predefinição é personalizada (padrão 0.16.0).
      clean_session_locks_on_start:
        name: Limpar Bloqueios de Sessão ao Iniciar
        description: Remover arquivos de bloqueio de sessão obsoletos quando o add-on iniciar.
      clean_session_locks_on_exit:
        name: Limpar Bloqueios de Sessão ao Sair
        description: Remover arquivos de bloqueio de sessão no encerramento normal.
