name: Hermes Agent Integration
version: "0.0.20"
slug: hermes_agent
stage: experimental
description: Run Hermes Agent inside Home Assistant via the Hermes Agent Integration add-on.
url: https://github.com/jackalski/HermesAgentHomeAssistant
services:
  - mqtt:want
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
init: false
hassio_api: false
homeassistant_api: false
host_network: true

# Home Assistant Ingress (UI inside the add-on page)
ingress: true
ingress_port: 48099
panel_title: Hermes Agent Integration
panel_icon: mdi:robot

map:
  - addon_config:rw
  - share:rw
  - media:rw
options:
  # --- General ---
  timezone: "Europe/Sofia"
  addon_log_level: info

  # --- First-run setup ---
  setup_profile: home_assistant
  default_provider: openrouter
  default_model_preset: custom
  default_model: ""

  provider_api_keys:
    openai_api_key: ""
    openrouter_api_key: ""
    anthropic_api_key: ""
    google_api_key: ""
    ollama_api_key: ""
    minimax_api_key: ""
    discord_bot_token: ""
    github_token: ""
    xai_api_key: ""
    firecrawl_api_key: ""
    searxng_url: ""

  # --- Home Assistant integration ---
  home_assistant:
    hass_url: ""
    homeassistant_token: ""
    auto_configure_mcp: false

  # --- Web terminal (Ingress) ---
  enable_terminal: true
  terminal_port: 7681

  # --- Gateway access ---
  gateway_access:
    access_mode: lan_https
    gateway_port: 18789
    gateway_public_url: ""
    enable_openai_api: false
    gateway_mode: local
    gateway_remote_url: ""
    gateway_bind_mode: loopback
    gateway_auth_mode: token
    gateway_trusted_proxies: []
    gateway_additional_allowed_origins: []
    controlui_disable_device_auth: true

  # --- MQTT status sensors ---
  mqtt_settings:
    broker_host: ""
    broker_port: 1883
    broker_username: ""
    broker_password: ""
    enable_ha_status_sensors: true
    publish_mqtt_discovery: true
    status_poll_interval_seconds: 60
    state_prefix: "hermes"

  # --- Optional router SSH ---
  router_ssh:
    host: ""
    user: ""
    key_path: "/config/keys/router_ssh"

  # --- Tool bootstrap ---
  tools_bootstrap:
    tool_telegram_enabled: false
    tool_browser_enabled: true
    tool_skills_hub_enabled: true

  # --- Advanced ---
  advanced_settings:
    http_proxy: ""
    force_ipv4_dns: true
    nginx_log_level: minimal
    gateway_env_vars: []
    hermes_agent_version_preset: custom
    hermes_agent_version_custom: "0.16.0"
    clean_session_locks_on_start: true
    clean_session_locks_on_exit: true

schema:
  timezone: str
  addon_log_level: list(error|warn|info|debug)?
  setup_profile: list(home_assistant|general|advanced)?
  default_provider: list(nous|openrouter|google|anthropic|ollama|minimax|xai|openai)?
  default_model_preset: list(custom)?
  default_model: str?
  provider_api_keys:
    openai_api_key: str?
    openrouter_api_key: str?
    anthropic_api_key: str?
    google_api_key: str?
    ollama_api_key: str?
    minimax_api_key: str?
    discord_bot_token: str?
    github_token: str?
    xai_api_key: str?
    firecrawl_api_key: str?
    searxng_url: str?
  home_assistant:
    hass_url: str?
    homeassistant_token: password?
    auto_configure_mcp: bool?
  enable_terminal: bool?
  terminal_port: port?
  gateway_access:
    access_mode: list(custom|local_only|lan_https|lan_reverse_proxy|tailnet_https)?
    gateway_port: port?
    gateway_public_url: str?
    enable_openai_api: bool?
    gateway_mode: list(local|remote)?
    gateway_remote_url: str?
    gateway_bind_mode: list(loopback|lan|tailnet)?
    gateway_auth_mode: list(token|trusted-proxy)?
    gateway_trusted_proxies:
      - value: 'match(^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(\/([0-9]|[1-2][0-9]|3[0-2]))?|([0-9a-fA-F:]+)(\/\d{1,3})?)$)'
    gateway_additional_allowed_origins:
      - value: str
    controlui_disable_device_auth: bool?
  mqtt_settings:
    broker_host: str?
    broker_port: port?
    broker_username: str?
    broker_password: password?
    enable_ha_status_sensors: bool?
    publish_mqtt_discovery: bool?
    status_poll_interval_seconds: int(30,300)?
    state_prefix: str?
  router_ssh:
    host: str
    user: str
    key_path: str
  tools_bootstrap:
    tool_telegram_enabled: bool?
    tool_browser_enabled: bool?
    tool_skills_hub_enabled: bool?
  advanced_settings:
    http_proxy: str?
    force_ipv4_dns: bool?
    nginx_log_level: list(full|minimal)?
    gateway_env_vars:
      - name: "match(^[A-Z_][A-Z0-9_]*$)"
        value: str
    hermes_agent_version_preset: list(latest|custom)?
    hermes_agent_version_custom: str?
    clean_session_locks_on_start: bool?
    clean_session_locks_on_exit: bool?
